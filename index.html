<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>GeoBrain — ANP Oil & Gas Ontology</title>
<meta name="description" content="Visualização interativa da ontologia ANP de Exploração & Produção de petróleo no Brasil." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    color-scheme: dark;
    --bg:        #000000;
    --panel:     #0A0A0A;
    --panel-2:   #141414;
    --fg:        #F5F2EA;
    --fg-soft:   #8A877F;
    --hairline:  #1F1F1B;
    --hairline-2:#2C2C25;
    --shadow:    0 24px 60px rgba(0,0,0,0.85), 0 0 0 1px var(--hairline);
    --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    --t-operational: #378ADD;
    --t-contractual: #7F77DD;
    --t-actor:       #D85A30;
    --t-instrument:  #888780;
    --t-geological:  #639922;
    --t-equipment:   #C77B30;
    --t-analytical:  #E67E22;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--fg);
    font-family: var(--sans);
    font-size: 14px; line-height: 1.5;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ─────────────────────────────────────────────── */
  header {
    display: flex; align-items: stretch; justify-content: space-between;
    padding: 18px 28px 16px; background: var(--bg);
    border-bottom: 1px solid var(--hairline);
    position: relative;
  }
  header .brand .eyebrow {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.22em;
    color: var(--fg-soft); text-transform: uppercase; margin-bottom: 4px;
  }
  header .brand h1 {
    font-family: var(--mono); font-weight: 700;
    margin: 0; font-size: 17px; letter-spacing: -0.005em;
    color: var(--fg);
  }
  header .brand h1 .accent { color: var(--t-actor); }
  header .actions { display: flex; gap: 8px; align-items: center; }
  header .actions a {
    font-family: var(--mono); font-size: 11px; font-weight: 500;
    color: var(--fg); text-decoration: none;
    padding: 8px 14px; border: 1px solid var(--hairline-2);
    text-transform: uppercase; letter-spacing: 0.08em;
    transition: border-color 120ms ease, color 120ms ease, background 120ms ease;
  }
  header .actions a:hover { border-color: var(--fg); background: var(--panel-2); }
  header .actions a.primary { background: var(--t-actor); border-color: var(--t-actor); color: #000; }
  header .actions a.primary:hover { background: #FF7A4A; border-color: #FF7A4A; }

  /* The signature ribbon — 7 colored bands, one per node type. Doubles as legend. */
  .ribbon {
    display: grid; grid-template-columns: repeat(7, 1fr);
    height: 3px; width: 100%;
  }
  .ribbon .band { transition: height 200ms ease, opacity 200ms ease; }
  .ribbon .band[data-type="operational"] { background: var(--t-operational); }
  .ribbon .band[data-type="contractual"] { background: var(--t-contractual); }
  .ribbon .band[data-type="actor"]       { background: var(--t-actor); }
  .ribbon .band[data-type="instrument"]  { background: var(--t-instrument); }
  .ribbon .band[data-type="geological"]  { background: var(--t-geological); }
  .ribbon .band[data-type="equipment"]   { background: var(--t-equipment); }
  .ribbon .band[data-type="analytical"]  { background: var(--t-analytical); }

  /* ── TOOLBAR (filters) ──────────────────────────────────── */
  .toolbar {
    display: flex; gap: 0; flex-wrap: wrap;
    padding: 14px 28px; background: var(--bg);
    border-bottom: 1px solid var(--hairline);
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em;
  }
  .toolbar > .toolbar-label {
    color: var(--fg-soft); padding: 6px 14px 6px 0; text-transform: uppercase;
    align-self: center; border-right: 1px solid var(--hairline);
    margin-right: 14px;
  }
  .toolbar label {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 12px; cursor: pointer; user-select: none;
    text-transform: uppercase; color: var(--fg-soft);
    transition: color 120ms ease;
  }
  .toolbar label:hover { color: var(--fg); }
  .toolbar label input { display: none; }
  .toolbar label:has(input:checked) { color: var(--fg); }
  .toolbar label:has(input:not(:checked)) .swatch { opacity: 0.25; }
  .toolbar .swatch { width: 8px; height: 8px; display: inline-block; transition: opacity 120ms ease; }

  /* ── MAIN ────────────────────────────────────────────────── */
  main { position: relative; height: calc(100vh - 132px); display: flex; background: var(--bg); }
  #graph { flex: 1; height: 100%; background: var(--bg); position: relative; }
  #graph svg { width: 100%; height: 100%; display: block; background: var(--bg); }

  /* Subtle scan-line / grid backdrop on the graph for "instrument" feel */
  #graph::before {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background-image:
      radial-gradient(circle at 50% 50%, rgba(255,255,255,0.025) 0%, transparent 60%),
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: auto, 80px 80px, 80px 80px;
  }

  /* Coordinate axis label — far corner */
  #graph .axis-label {
    position: absolute; bottom: 14px; left: 18px;
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.18em;
    color: rgba(245,242,234,0.28); text-transform: uppercase;
    pointer-events: none; user-select: none;
  }

  /* ── ASIDE (side panel) ─────────────────────────────────── */
  aside {
    width: 380px; flex-shrink: 0;
    background: var(--panel); padding: 0; overflow-y: auto;
    border-left: 1px solid var(--hairline);
    position: relative;
  }
  aside.empty {
    display: flex; align-items: center; justify-content: center;
    color: var(--fg-soft); text-align: center; padding: 60px 30px;
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  aside.empty::before {
    content: '◉'; display: block; font-size: 24px; margin-bottom: 12px;
    color: var(--fg-soft); opacity: 0.3;
  }
  aside .panel-head {
    padding: 24px 28px 20px; position: relative;
    border-bottom: 1px solid var(--hairline);
  }
  aside .panel-head::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; background: var(--type-color, var(--fg-soft));
  }
  aside .type-tag {
    font-family: var(--mono); font-size: 10px; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--type-color, var(--fg-soft)); margin-bottom: 10px;
    display: inline-flex; align-items: center; gap: 8px;
  }
  aside .type-tag::before {
    content: ''; width: 6px; height: 6px; background: currentColor;
    display: inline-block;
  }
  aside h2 {
    font-family: var(--sans); font-weight: 700;
    margin: 0; font-size: 22px; line-height: 1.2;
    color: var(--fg); letter-spacing: -0.01em;
  }
  aside .label-en {
    color: var(--fg-soft); font-size: 13px; margin-top: 6px;
    font-family: var(--mono); font-weight: 400; font-style: normal;
  }

  aside .body { padding: 4px 28px 32px; }
  aside .row { padding: 18px 0; border-bottom: 1px solid var(--hairline); }
  aside .row:last-child { border-bottom: none; }
  aside .row .k {
    color: var(--fg-soft); font-family: var(--mono);
    font-size: 9px; text-transform: uppercase; letter-spacing: 0.18em;
    margin-bottom: 10px; font-weight: 500;
  }
  aside .row .v { font-size: 13.5px; line-height: 1.55; color: var(--fg); }
  aside .row .v.italic { font-style: italic; color: var(--fg-soft); font-size: 13px; }

  aside .badge {
    display: inline-block; font-family: var(--mono);
    font-size: 10px; padding: 4px 9px; margin: 2px 4px 2px 0;
    background: var(--panel-2); border: 1px solid var(--hairline-2);
    color: var(--fg); letter-spacing: 0.04em;
  }
  aside .layer-badge {
    display: inline-block; font-family: var(--mono);
    font-size: 9px; padding: 4px 9px; margin: 2px 4px 2px 0;
    font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  }
  aside .layer-badge.layer1 { background: #2A2848; color: #C5C0F0; }
  aside .layer-badge.layer2 { background: #173B30; color: #A0E0CC; }
  aside .layer-badge.layer3 { background: #142B45; color: #B0D0F0; }
  aside .layer-badge.layer4 { background: #2C2C28; color: #D5D2C5; }
  aside .layer-badge.layer5 { background: #2A3A18; color: #C0E090; }
  aside .layer-badge.layer6 { background: #3D2410; color: #F0C896; }
  aside .ext-link {
    display: block; font-family: var(--mono);
    font-size: 11px; margin-top: 6px; padding: 8px 10px;
    color: var(--fg-soft); text-decoration: none;
    border: 1px solid var(--hairline-2);
    transition: border-color 120ms ease, color 120ms ease, background 120ms ease;
  }
  aside .ext-link:hover {
    color: var(--fg); border-color: var(--fg-soft); background: var(--panel-2);
  }
  aside .ext-link::after { content: ' →'; opacity: 0.5; }

  /* ── FOOTER ─────────────────────────────────────────────── */
  footer {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; gap: 16px; flex-wrap: wrap; align-items: center;
    padding: 10px 28px; background: var(--bg);
    border-top: 1px solid var(--hairline);
    font-family: var(--mono); font-size: 10px;
    color: var(--fg-soft); letter-spacing: 0.08em;
    z-index: 50;
  }
  footer .count {
    margin-left: auto; color: var(--fg);
    text-transform: uppercase; font-weight: 700;
  }
  footer .count strong { color: var(--t-actor); font-weight: 700; }

  /* ── GRAPH NODES & EDGES ────────────────────────────────── */
  .node circle {
    cursor: pointer;
    transition: r 180ms cubic-bezier(0.16, 1, 0.3, 1),
                stroke-width 180ms ease,
                opacity 180ms ease;
    stroke: rgba(0,0,0,0.5); stroke-width: 1.5px;
  }
  .node circle.has-glow { filter: url(#node-glow); }
  .node text {
    pointer-events: none; fill: var(--fg);
    font-family: var(--mono); font-size: 9.5px; font-weight: 700;
    text-anchor: middle; dominant-baseline: middle;
    letter-spacing: 0.04em; text-transform: uppercase;
    text-shadow: 0 1px 4px rgba(0,0,0,0.95), 0 0 8px rgba(0,0,0,0.85);
    transition: opacity 180ms ease;
  }
  .node.dim { opacity: 0.15; }
  .node.dim text { opacity: 0; }
  .node.focus circle { stroke: var(--fg); stroke-width: 2px; }
  .node:hover circle { stroke: var(--fg); stroke-width: 2px; }

  .link {
    fill: none; stroke: rgba(245,242,234,0.52); stroke-width: 1.8px;
    transition: opacity 180ms ease, stroke 180ms ease, stroke-width 180ms ease;
  }
  .link.dashed {
    stroke: rgba(245,242,234,0.32); stroke-dasharray: 5,4; stroke-width: 1.3px;
  }
  .link.dim { opacity: 0.04; }
  .link.active {
    stroke: rgba(255,190,60,1); stroke-width: 2.8px; opacity: 1;
    filter: drop-shadow(0 0 4px rgba(255,190,60,0.55));
  }

  /* ── TOOLTIP ───────────────────────────────────────────── */
  .tooltip {
    position: absolute; pointer-events: none;
    background: #000; color: var(--fg); padding: 0;
    border: 1px solid var(--hairline-2);
    box-shadow: var(--shadow);
    z-index: 100; opacity: 0; transition: opacity 120ms ease;
    font-family: var(--mono); font-size: 11px;
    min-width: 160px;
  }
  .tooltip.show { opacity: 1; }
  .tooltip .strip {
    height: 2px; background: var(--type-color, var(--fg-soft));
  }
  .tooltip .body { padding: 8px 12px 10px; }
  .tooltip .t-type {
    color: var(--type-color, var(--fg-soft)); font-size: 9px;
    text-transform: uppercase; letter-spacing: 0.18em;
    margin-bottom: 4px; font-weight: 700;
  }
  .tooltip strong { font-size: 13px; font-weight: 700; font-family: var(--sans); }
  .tooltip .t-en {
    display: block; color: var(--fg-soft); font-size: 10px;
    margin-top: 2px; font-weight: 400;
  }

  /* ── RESPONSIVE ────────────────────────────────────────── */
  @media (max-width: 860px) {
    main { flex-direction: column; height: calc(100vh - 132px); }
    aside { width: 100%; height: 50%; border-left: none; border-top: 1px solid var(--hairline); }
    header { padding: 14px 18px; }
    .toolbar { padding: 10px 18px; }
    header .brand h1 { font-size: 14px; }
  }

  /* Custom scrollbar for the panel */
  aside::-webkit-scrollbar { width: 8px; }
  aside::-webkit-scrollbar-track { background: var(--panel); }
  aside::-webkit-scrollbar-thumb { background: var(--hairline-2); }
  aside::-webkit-scrollbar-thumb:hover { background: var(--fg-soft); }

  /* ── ZOOM CONTROLS ──────────────────────────────────────── */
  .zoom-controls {
    position: absolute; bottom: 46px; left: 18px;
    display: flex; align-items: center; gap: 0;
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.05em;
    z-index: 20; user-select: none;
  }
  .zoom-btn {
    display: flex; align-items: center; justify-content: center;
    width: 30px; height: 26px;
    background: rgba(6,6,6,0.90); border: 1px solid var(--hairline-2);
    color: var(--fg-soft); cursor: pointer; border-right: none;
    transition: background 90ms ease, color 90ms ease, transform 80ms ease;
  }
  .zoom-btn:hover { background: var(--panel-2); color: var(--fg); }
  .zoom-btn:active { transform: scale(0.90); }
  .zoom-btn.z-end { border-right: 1px solid var(--hairline-2); }
  #zoom-level {
    display: flex; align-items: center; justify-content: center;
    min-width: 48px; height: 26px; padding: 0 6px;
    background: rgba(6,6,6,0.90); border: 1px solid var(--hairline-2); border-right: none;
    color: var(--fg); font-weight: 700; font-size: 10px; cursor: pointer;
    transition: color 90ms ease;
  }
  #zoom-level:hover { color: var(--t-actor); }
  .zoom-divider {
    width: 1px; height: 26px; background: var(--hairline-2); flex-shrink: 0; margin: 0 5px;
  }

  /* ── MINIMAP ────────────────────────────────────────────── */
  .minimap-wrap {
    position: absolute; bottom: 46px; right: 18px; z-index: 20;
    font-family: var(--mono);
  }
  .minimap-head {
    display: flex; align-items: center; justify-content: space-between;
    height: 22px; padding: 0 9px;
    background: rgba(6,6,6,0.90); border: 1px solid var(--hairline-2); border-bottom: none;
    font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--fg-soft);
  }
  .minimap-head button {
    background: none; border: none; cursor: pointer;
    color: var(--fg-soft); font-size: 10px; padding: 0 2px; line-height: 1;
    transition: color 90ms ease;
  }
  .minimap-head button:hover { color: var(--fg); }
  #minimap-svg {
    display: block; cursor: crosshair;
    border: 1px solid var(--hairline-2);
    background: rgba(4,4,4,0.93);
  }
  .minimap-wrap.collapsed #minimap-svg { display: none; }

  /* ── KEYBOARD HINT ──────────────────────────────────────── */
  .kbd-hint {
    position: absolute; bottom: 46px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 14px;
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.10em; text-transform: uppercase;
    color: rgba(245,242,234,0.22); pointer-events: none; user-select: none;
    white-space: nowrap; z-index: 10;
  }
  .kbd-hint kbd {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 18px; height: 16px; padding: 0 4px;
    border: 1px solid rgba(245,242,234,0.14);
    background: rgba(255,255,255,0.04);
    border-radius: 2px; font-family: inherit; font-size: 9px;
    color: rgba(245,242,234,0.28); margin-right: 4px;
  }

  /* ── NODE SEARCH ───────────────────────────────────────────── */
  .search-wrap {
    position: relative; margin-left: auto; display: flex; align-items: center;
  }
  .search-icon {
    position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
    pointer-events: none; color: var(--fg-soft); display: flex;
  }
  #node-search {
    background: var(--panel-2); border: 1px solid var(--hairline-2);
    color: var(--fg); font-family: var(--mono); font-size: 11px;
    padding: 5px 10px 5px 30px; width: 200px; outline: none;
    transition: border-color 120ms ease, width 160ms ease, box-shadow 120ms ease;
  }
  #node-search::placeholder { color: var(--fg-soft); }
  #node-search:focus {
    border-color: var(--fg-soft); width: 260px;
    box-shadow: 0 0 0 2px rgba(245,242,234,0.06);
  }
  #node-search.has-results { border-color: rgba(255,190,60,0.6); }

  #search-results {
    position: absolute; top: calc(100% + 4px); right: 0;
    background: var(--panel); border: 1px solid var(--hairline-2);
    min-width: 260px; max-height: 280px; overflow-y: auto;
    z-index: 200; display: none; box-shadow: var(--shadow);
  }
  #search-results.open { display: block; }
  .sr-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 12px; cursor: pointer;
    border-bottom: 1px solid var(--hairline);
    transition: background 80ms ease;
  }
  .sr-item:last-child { border-bottom: none; }
  .sr-item:hover, .sr-item.active { background: var(--panel-2); }
  .sr-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .sr-label { font-size: 12px; font-weight: 600; color: var(--fg); }
  .sr-label mark {
    background: rgba(255,190,60,0.28); color: inherit; padding: 0 1px;
    border-radius: 2px;
  }
  .sr-en { font-size: 10px; color: var(--fg-soft); font-family: var(--mono); }
  .sr-empty {
    padding: 12px; text-align: center;
    color: var(--fg-soft); font-size: 11px; font-family: var(--mono);
  }
</style>
</head>
<body>
  <header>
    <div class="brand">
      <div class="eyebrow">Geolytics · Petrobras · Semantic Layer 1–7</div>
      <h1>ANP Oil &amp; Gas <span class="accent">Ontology</span></h1>
    </div>
    <div class="actions">
      <a href="index-cards.html">Cards</a>
      <a href="gso-cards.html">GSO L7</a>
      <a href="data/geobrain.ttl">TTL</a>
      <a href="data/full.json" download>JSON</a>
      <a href="https://github.com/thiagoflc/geobrain" target="_blank" rel="noopener">GitHub</a>
    </div>
  </header>
  <div class="ribbon" aria-hidden="true">
    <span class="band" data-type="operational"></span>
    <span class="band" data-type="contractual"></span>
    <span class="band" data-type="actor"></span>
    <span class="band" data-type="instrument"></span>
    <span class="band" data-type="geological"></span>
    <span class="band" data-type="equipment"></span>
    <span class="band" data-type="analytical"></span>
  </div>

  <div class="toolbar" id="filters">
    <span class="toolbar-label">Filter</span>
    <label><input type="checkbox" data-type="operational" checked /><span class="swatch" style="background:#378ADD"></span>Operacional</label>
    <label><input type="checkbox" data-type="contractual" checked /><span class="swatch" style="background:#7F77DD"></span>Contratual</label>
    <label><input type="checkbox" data-type="actor" checked /><span class="swatch" style="background:#D85A30"></span>Atores</label>
    <label><input type="checkbox" data-type="instrument" checked /><span class="swatch" style="background:#888780"></span>Instrumentos</label>
    <label><input type="checkbox" data-type="geological" checked /><span class="swatch" style="background:#639922"></span>Geológico</label>
    <label><input type="checkbox" data-type="equipment" checked /><span class="swatch" style="background:#C77B30"></span>Equipamento</label>
    <label><input type="checkbox" data-type="analytical" checked /><span class="swatch" style="background:#E67E22"></span>Analítico</label>
    <div class="search-wrap">
      <span class="search-icon">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="6.5" cy="6.5" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/>
        </svg>
      </span>
      <input id="node-search" type="text" placeholder="Buscar nó…" autocomplete="off" spellcheck="false" />
      <div id="search-results"></div>
    </div>
  </div>

  <main>
    <div id="graph">
      <div class="axis-label">Force-Directed Graph · D3 v7</div>

      <!-- Zoom controls -->
      <div class="zoom-controls" aria-label="Controles de zoom">
        <button class="zoom-btn" id="btn-zoom-out" title="Diminuir (−)">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true">
            <line x1="2.5" y1="6" x2="9.5" y2="6"/>
          </svg>
        </button>
        <div id="zoom-level" title="Nível de zoom · clique para resetar (0)" role="status" aria-live="polite">100%</div>
        <button class="zoom-btn z-end" id="btn-zoom-in" title="Ampliar (+)">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true">
            <line x1="6" y1="2.5" x2="6" y2="9.5"/><line x1="2.5" y1="6" x2="9.5" y2="6"/>
          </svg>
        </button>
        <div class="zoom-divider" aria-hidden="true"></div>
        <button class="zoom-btn z-end" id="btn-fit" title="Ajustar ao grafo (F)">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="2,4.5 2,2 4.5,2"/><polyline points="7.5,2 10,2 10,4.5"/>
            <polyline points="10,7.5 10,10 7.5,10"/><polyline points="4.5,10 2,10 2,7.5"/>
          </svg>
        </button>
      </div>

      <!-- Keyboard hints -->
      <div class="kbd-hint" aria-hidden="true">
        <span><kbd>+</kbd><kbd>−</kbd> zoom</span>
        <span><kbd>F</kbd> ajustar</span>
        <span><kbd>0</kbd> resetar</span>
        <span><kbd>⌘K</kbd> buscar</span>
      </div>

      <!-- Minimap -->
      <div class="minimap-wrap" id="minimap-wrap">
        <div class="minimap-head">
          <span>Minimap</span>
          <button id="minimap-toggle" title="Recolher minimap">▾</button>
        </div>
        <svg id="minimap-svg" width="160" height="110"></svg>
      </div>
    </div>
    <aside id="panel" class="empty">Selecione uma entidade</aside>
  </main>

  <footer>
    <span>Layers L1 GeoCore · L2 O3PO · L3 PetroKGraph · L4 OSDU · L5 ANP · L6 Petrobras</span>
    <span class="count" id="counts"></span>
  </footer>

  <div class="tooltip" id="tooltip"></div>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script>
(async function () {
  const res = await fetch('data/entity-graph.json');
  const graph = await res.json();

  const datasetTitles = {
    'pocos-exploratorios': 'Poços Exploratórios',
    'blocos-contrato': 'Blocos sob Contrato',
    'pads-andamento': 'PADs em Andamento',
    'pads-concluidos': 'PADs Concluídos',
    'declaracoes-comercialidade': 'Declarações de Comercialidade',
    'processos-sancionadores': 'Processos Sancionadores',
    'ranp-708': 'Resolução ANP nº 708/2017',
    'ranp-815': 'Resolução ANP nº 815/2020',
  };

  const typeLabel = {
    operational: 'Operacional',
    contractual: 'Contratual',
    actor: 'Ator',
    instrument: 'Instrumento',
    geological: 'Geológico',
    equipment: 'Equipamento',
    analytical: 'Analítico',
  };
  const layerLabelsExt = { layer6: 'Petrobras' };

  const TYPE_COLOR = {
    operational: '#378ADD', contractual: '#7F77DD', actor: '#D85A30',
    instrument: '#888780', geological: '#639922', equipment: '#C77B30',
    analytical: '#E67E22',
  };
  /* Types that get a soft glow halo — the "hero" entities */
  const GLOW_TYPES = new Set(['operational', 'actor']);

  const container = document.getElementById('graph');
  const searchInput   = document.getElementById('node-search');
  const searchResults = document.getElementById('search-results');
  const tooltip = document.getElementById('tooltip');
  const panel = document.getElementById('panel');
  const counts = document.getElementById('counts');
  counts.innerHTML = `<strong>${graph.nodes.length}</strong> nós · <strong>${graph.edges.length}</strong> relações`;

  const W = container.clientWidth || 800;
  const H = container.clientHeight || 600;

  const svg = d3.select('#graph').append('svg').attr('viewBox', [0, 0, W, H]);

  /* SVG defs — glow filter for primary nodes + per-type radial gradients */
  const defs = svg.append('defs');
  const glow = defs.append('filter')
    .attr('id', 'node-glow')
    .attr('x', '-60%').attr('y', '-60%')
    .attr('width', '220%').attr('height', '220%');
  glow.append('feGaussianBlur').attr('stdDeviation', '4').attr('result', 'blur');
  const merge = glow.append('feMerge');
  merge.append('feMergeNode').attr('in', 'blur');
  merge.append('feMergeNode').attr('in', 'SourceGraphic');

  /* Arrowhead markers */
  const makeArrow = (id, color) =>
    defs.append('marker')
      .attr('id', id)
      .attr('viewBox', '0 0 8 8')
      .attr('refX', 7).attr('refY', 4)
      .attr('markerWidth', 5).attr('markerHeight', 5)
      .attr('orient', 'auto-start-reverse')
      .append('path')
        .attr('d', 'M0,0 L8,4 L0,8 Z')
        .attr('fill', color);
  makeArrow('arrow-solid',  'rgba(245,242,234,0.70)');
  makeArrow('arrow-dashed', 'rgba(245,242,234,0.42)');
  makeArrow('arrow-active', 'rgba(255,190,60,1)');

  const root = svg.append('g');

  let currentZoom = 1;
  const zoomBehavior = d3.zoom().scaleExtent([0.1, 8]).on('zoom', (ev) => {
    root.attr('transform', ev.transform);
    currentZoom = ev.transform.k;
    updateLabels();
    updateZoomDisplay();
    updateMinimap();
  });
  svg.call(zoomBehavior);

  /* ── ZOOM TOOLS ─────────────────────────────────────────── */
  function updateZoomDisplay() {
    const el = document.getElementById('zoom-level');
    if (el) el.textContent = Math.round(currentZoom * 100) + '%';
  }

  const ZOOM_STEP = 1.35;

  function zoomIn() {
    svg.transition().duration(240).ease(d3.easeCubicOut)
      .call(zoomBehavior.scaleBy, ZOOM_STEP);
  }
  function zoomOut() {
    svg.transition().duration(240).ease(d3.easeCubicOut)
      .call(zoomBehavior.scaleBy, 1 / ZOOM_STEP);
  }
  function resetView() {
    svg.transition().duration(500).ease(d3.easeCubicInOut)
      .call(zoomBehavior.transform, d3.zoomIdentity);
  }
  function fitView() {
    const settled = nodes.filter((n) => n.x != null && !isNaN(n.x));
    if (!settled.length) return;
    let x0 = Infinity, y0 = Infinity, x1 = -Infinity, y1 = -Infinity;
    settled.forEach((n) => {
      const r = n.computedSize / 2 + 16;
      x0 = Math.min(x0, n.x - r); y0 = Math.min(y0, n.y - r);
      x1 = Math.max(x1, n.x + r); y1 = Math.max(y1, n.y + r);
    });
    const w = container.clientWidth, h = container.clientHeight;
    const bw = x1 - x0, bh = y1 - y0;
    const sc = Math.min(0.92 * Math.min(w / bw, h / bh), 3);
    svg.transition().duration(620).ease(d3.easeCubicInOut)
      .call(zoomBehavior.transform,
        d3.zoomIdentity
          .translate(w / 2 - sc * (x0 + bw / 2), h / 2 - sc * (y0 + bh / 2))
          .scale(sc));
  }

  document.getElementById('btn-zoom-in').addEventListener('click', zoomIn);
  document.getElementById('btn-zoom-out').addEventListener('click', zoomOut);
  document.getElementById('btn-fit').addEventListener('click', fitView);
  document.getElementById('zoom-level').addEventListener('click', resetView);

  /* ── MINIMAP ─────────────────────────────────────────────── */
  const MM_W = 160, MM_H = 110;
  const mmSvg = d3.select('#minimap-svg');
  const mmDots = mmSvg.append('g');
  const mmVP = mmSvg.append('rect')
    .attr('fill', 'rgba(255,190,60,0.07)')
    .attr('stroke', 'rgba(255,190,60,0.72)')
    .attr('stroke-width', 1.2)
    .attr('rx', 1.5);

  let _mm = null;

  function updateMinimap() {
    const settled = nodes.filter((n) => n.x != null && !isNaN(n.x));
    if (!settled.length) return;
    const PAD = 20;
    let bx0 = Infinity, by0 = Infinity, bx1 = -Infinity, by1 = -Infinity;
    settled.forEach((n) => {
      bx0 = Math.min(bx0, n.x); by0 = Math.min(by0, n.y);
      bx1 = Math.max(bx1, n.x); by1 = Math.max(by1, n.y);
    });
    bx0 -= PAD; by0 -= PAD; bx1 += PAD; by1 += PAD;
    const bw = bx1 - bx0, bh = by1 - by0;
    const sc = Math.min(MM_W / bw, MM_H / bh);
    const offX = (MM_W - bw * sc) / 2;
    const offY = (MM_H - bh * sc) / 2;
    _mm = { bx0, by0, sc, offX, offY };

    mmDots.selectAll('circle')
      .data(settled, (d) => d.id)
      .join('circle')
      .attr('cx', (n) => offX + (n.x - bx0) * sc)
      .attr('cy', (n) => offY + (n.y - by0) * sc)
      .attr('r', (n) => Math.max(1.2, (n.computedSize / 2) * sc * 0.65))
      .attr('fill', (n) => n.color || TYPE_COLOR[n.type] || '#888')
      .attr('opacity', 0.72);

    const t = d3.zoomTransform(svg.node());
    const cw = container.clientWidth, ch = container.clientHeight;
    mmVP
      .attr('x', offX + (-t.x / t.k - bx0) * sc)
      .attr('y', offY + (-t.y / t.k - by0) * sc)
      .attr('width', Math.max(4, (cw / t.k) * sc))
      .attr('height', Math.max(4, (ch / t.k) * sc));
  }

  mmSvg.on('click', (ev) => {
    if (!_mm) return;
    const [mx, my] = d3.pointer(ev);
    const simX = (mx - _mm.offX) / _mm.sc + _mm.bx0;
    const simY = (my - _mm.offY) / _mm.sc + _mm.by0;
    const cw = container.clientWidth, ch = container.clientHeight;
    svg.transition().duration(340).ease(d3.easeCubicOut)
      .call(zoomBehavior.transform,
        d3.zoomIdentity
          .translate(cw / 2 - currentZoom * simX, ch / 2 - currentZoom * simY)
          .scale(currentZoom));
  });

  document.getElementById('minimap-toggle').addEventListener('click', () => {
    const wrap = document.getElementById('minimap-wrap');
    const btn  = document.getElementById('minimap-toggle');
    wrap.classList.toggle('collapsed');
    btn.textContent = wrap.classList.contains('collapsed') ? '▸' : '▾';
    btn.title = wrap.classList.contains('collapsed') ? 'Expandir minimap' : 'Recolher minimap';
  });

  const links = graph.edges.map((e) => ({ ...e }));
  const nodes = graph.nodes.map((n) => ({ ...n }));

  /* Degree centrality — give the most-connected nodes extra visual weight. */
  const degree = new Map();
  links.forEach((l) => {
    degree.set(l.source, (degree.get(l.source) || 0) + 1);
    degree.set(l.target, (degree.get(l.target) || 0) + 1);
  });
  const maxDeg = Math.max(...degree.values(), 1);
  nodes.forEach((n) => {
    n.degree = degree.get(n.id) || 0;
    n.computedSize = (n.size || 18) + Math.round((n.degree / maxDeg) * 14);
  });

  /* Adjacency map for hover-focus */
  const adj = new Map();
  links.forEach((l) => {
    if (!adj.has(l.source)) adj.set(l.source, new Set());
    if (!adj.has(l.target)) adj.set(l.target, new Set());
    adj.get(l.source).add(l.target);
    adj.get(l.target).add(l.source);
  });

  const sim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id((d) => d.id).distance(130).strength(0.7))
    .force('charge', d3.forceManyBody().strength(-340))
    .force('center', d3.forceCenter(W / 2, H / 2))
    .force('collide', d3.forceCollide().radius((d) => d.computedSize / 2 + 10));

  const link = root.append('g').attr('class', 'links').selectAll('line')
    .data(links).join('line')
    .attr('class', (d) => 'link' + (d.style === 'dashed' ? ' dashed' : ''))
    .attr('marker-end', (d) => d.style === 'dashed' ? 'url(#arrow-dashed)' : 'url(#arrow-solid)');

  const node = root.append('g').attr('class', 'nodes').selectAll('g')
    .data(nodes).join('g')
    .attr('class', 'node')
    .call(d3.drag()
      .on('start', (ev, d) => { if (!ev.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag',  (ev, d) => { d.fx = ev.x; d.fy = ev.y; })
      .on('end',   (ev, d) => { if (!ev.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }));

  node.append('circle')
    .attr('r', (d) => d.computedSize / 2)
    .attr('fill', (d) => d.color)
    .attr('class', (d) => GLOW_TYPES.has(d.type) ? 'has-glow' : '')
    .on('mouseenter', (ev, d) => {
      const targetR = (d.computedSize / 2) * 1.25;
      d3.select(ev.currentTarget).transition().duration(140).attr('r', targetR);
      focusOn(d);
      const c = TYPE_COLOR[d.type] || '#888';
      tooltip.style.setProperty('--type-color', c);
      tooltip.classList.add('show');
      tooltip.innerHTML =
        `<div class="strip"></div>
         <div class="body">
           <div class="t-type">${(typeLabel[d.type] || d.type).toUpperCase()}</div>
           <strong>${d.label}</strong>
           ${d.label_en ? `<span class="t-en">${d.label_en}</span>` : ''}
         </div>`;
    })
    .on('mousemove', (ev) => {
      tooltip.style.left = (ev.clientX + 16) + 'px';
      tooltip.style.top  = (ev.clientY + 16) + 'px';
    })
    .on('mouseleave', (ev, d) => {
      d3.select(ev.currentTarget).transition().duration(140).attr('r', d.computedSize / 2);
      clearFocus();
      tooltip.classList.remove('show');
    })
    .on('click', (ev, d) => showPanel(d));

  node.append('text')
    .text((d) => d.label);

  function updateLabels() {
    /* Always-on labels for the heaviest nodes; zoom-gated for the rest */
    node.select('text').style('opacity', (d) =>
      currentZoom >= 1.3 || d.degree >= 4 || GLOW_TYPES.has(d.type) ? 1 : 0
    );
  }
  updateLabels();

  function focusOn(target) {
    const neighbors = adj.get(target.id) || new Set();
    node.classed('dim', (n) => n.id !== target.id && !neighbors.has(n.id));
    node.classed('focus', (n) => n.id === target.id);
    link.classed('dim', (l) => {
      const s = typeof l.source === 'object' ? l.source.id : l.source;
      const t = typeof l.target === 'object' ? l.target.id : l.target;
      return s !== target.id && t !== target.id;
    });
    link.classed('active', (l) => {
      const s = typeof l.source === 'object' ? l.source.id : l.source;
      const t = typeof l.target === 'object' ? l.target.id : l.target;
      return s === target.id || t === target.id;
    });
    link.attr('marker-end', (l) => {
      const s = typeof l.source === 'object' ? l.source.id : l.source;
      const t = typeof l.target === 'object' ? l.target.id : l.target;
      const isActive = s === target.id || t === target.id;
      return isActive ? 'url(#arrow-active)' : (l.style === 'dashed' ? 'url(#arrow-dashed)' : 'url(#arrow-solid)');
    });
  }
  function clearFocus() {
    node.classed('dim', false).classed('focus', false);
    link.classed('dim', false).classed('active', false);
    link.attr('marker-end', (l) => l.style === 'dashed' ? 'url(#arrow-dashed)' : 'url(#arrow-solid)');
    /* Re-apply type filters */
    applyFilters();
  }

  sim.on('tick', () => {
    link
      .attr('x1', (d) => d.source.x)
      .attr('y1', (d) => d.source.y)
      .attr('x2', (d) => {
        const dx = d.target.x - d.source.x, dy = d.target.y - d.source.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        return d.target.x - (dx / dist) * (d.target.computedSize / 2 + 5);
      })
      .attr('y2', (d) => {
        const dx = d.target.x - d.source.x, dy = d.target.y - d.source.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        return d.target.y - (dy / dist) * (d.target.computedSize / 2 + 5);
      });
    node.attr('transform', (d) => `translate(${d.x},${d.y})`);
    updateMinimap();
  });

  const layerLabels = {
    layer1: 'GeoCore', layer2: 'O3PO', layer3: 'PetroKGraph', layer4: 'OSDU', layer5: 'ANP', layer6: 'Petrobras',
  };
  const layerTitles = {
    layer1: 'BFO + GeoCore (UFRGS) — ontologia formal de geologia',
    layer2: 'O3PO + GeoReservoir (UFRGS) — produção offshore e reservatórios',
    layer3: 'Petro KGraph (PUC-Rio) — knowledge graph PT-BR de O&G',
    layer4: 'OSDU — Open Subsurface Data Universe (industry standard)',
    layer5: 'ANP / SIGEP / Lei 9478/1997 — marco regulatório brasileiro',
    layer6: 'Geolytics / Petrobras Internal — namespace corporativo (M7/M8/M9/M10)',
  };

  function showPanel(d) {
    panel.classList.remove('empty');
    const c = TYPE_COLOR[d.type] || '#888';
    panel.style.setProperty('--type-color', c);
    const datasetBadges = (d.datasets || []).map((id) =>
      `<span class="badge">${datasetTitles[id] || id}</span>`
    ).join('');
    const layerBadges = (d.geocoverage || []).map((L) =>
      `<span class="layer-badge ${L}" title="${layerTitles[L] || L}">${layerLabels[L] || L}</span>`
    ).join('');
    const synBlock = (d.synonyms_pt && d.synonyms_pt.length) || (d.synonyms_en && d.synonyms_en.length)
      ? `<div class="row"><div class="k">Sinônimos</div><div class="v">${[...(d.synonyms_pt||[]), ...(d.synonyms_en||[])].map(s=>`<span class="badge">${s}</span>`).join('')}</div></div>`
      : '';
    const exBlock = (d.examples && d.examples.length)
      ? `<div class="row"><div class="k">Exemplos</div><div class="v">${d.examples.map(s=>`<span class="badge">${s}</span>`).join('')}</div></div>`
      : '';
    const headHtml = `
      <div class="panel-head">
        <div class="type-tag">${(typeLabel[d.type] || d.type).toUpperCase()}${d.degree ? ` · ${d.degree} relações` : ''}</div>
        <h2>${d.label}</h2>
        ${d.label_en ? `<div class="label-en">${d.label_en}</div>` : ''}
      </div>`;
    const bodyHtml = `
      <div class="body">
        ${layerBadges ? `<div class="row"><div class="k">Camadas semânticas</div><div class="v">${layerBadges}</div></div>` : ''}
        <div class="row"><div class="k">Definição</div><div class="v">${d.definition || '—'}</div></div>
        ${d.definition_en_canonical ? `<div class="row"><div class="k">OSDU canonical (EN)</div><div class="v italic">${d.definition_en_canonical}</div></div>` : ''}
        ${synBlock}
        ${exBlock}
        ${d.legal_source ? `<div class="row"><div class="k">Fonte legal</div><div class="v">${d.legal_source}</div></div>` : ''}
        ${(d.datasets && d.datasets.length) ? `<div class="row"><div class="k">Aparece nos datasets</div><div class="v">${datasetBadges}</div></div>` : ''}
        ${d.osdu_kind ? `<div class="row"><div class="k">OSDU kind</div><div class="v"><span class="badge">${d.osdu_kind}</span></div></div>` : ''}
        ${d.petrokgraph_uri || d.owl_uri ? `<div class="row"><div class="k">Alinhamento ontológico</div><div class="v">
          ${d.petrokgraph_uri ? `<a class="ext-link" href="${d.petrokgraph_uri}" target="_blank" rel="noopener">Petro KGraph (PUC-Rio)</a>` : ''}
          ${d.owl_uri ? `<a class="ext-link" href="${d.owl_uri}" target="_blank" rel="noopener">OSDU OWL class (W3ID)</a>` : ''}
          ${d.owl_uri ? `<a class="ext-link" href="https://service.tib.eu/webvowl/#iri=https://thiagoflc.github.io/geobrain/data/geobrain.ttl" target="_blank" rel="noopener">Open in WebVOWL</a>` : ''}
        </div></div>` : ''}
      </div>`;
    panel.innerHTML = headHtml + bodyHtml;
  }

  /* filtros */
  function applyFilters() {
    const active = new Set(
      Array.from(document.querySelectorAll('#filters input:checked')).map((x) => x.dataset.type)
    );
    node.classed('dim', (d) => !active.has(d.type));
    link.classed('dim', (l) => {
      const s = typeof l.source === 'object' ? l.source : nodes.find(n => n.id === l.source);
      const t = typeof l.target === 'object' ? l.target : nodes.find(n => n.id === l.target);
      return !s || !t || !active.has(s.type) || !active.has(t.type);
    });
  }
  document.querySelectorAll('#filters input[type=checkbox]').forEach((cb) => {
    cb.addEventListener('change', applyFilters);
  });

  window.addEventListener('resize', () => {
    const w = container.clientWidth, h = container.clientHeight;
    svg.attr('viewBox', [0, 0, w, h]);
    sim.force('center', d3.forceCenter(w / 2, h / 2)).alpha(0.3).restart();
  });

  /* ── NODE SEARCH ─────────────────────────────────────────── */
  function highlight(text, query) {
    if (!query) return text;
    const idx = text.toLowerCase().indexOf(query.toLowerCase());
    if (idx === -1) return text;
    return text.slice(0, idx)
      + `<mark>${text.slice(idx, idx + query.length)}</mark>`
      + text.slice(idx + query.length);
  }

  function zoomToNode(d) {
    const W = container.clientWidth, H = container.clientHeight;
    const scale = Math.min(Math.max(currentZoom, 1.4), 2.2);
    const tx = W / 2 - scale * d.x;
    const ty = H / 2 - scale * d.y;
    svg.transition().duration(520).ease(d3.easeCubicInOut)
      .call(zoomBehavior.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
  }

  function selectNode(d) {
    closeSearch();
    zoomToNode(d);
    focusOn(d);
    showPanel(d);
  }

  function closeSearch() {
    searchResults.classList.remove('open');
    searchInput.classList.remove('has-results');
    searchInput.value = '';
    activeIdx = -1;
  }

  let activeIdx = -1;
  let currentMatches = [];

  function renderResults(query) {
    const q = query.trim();
    if (q.length < 1) {
      searchResults.classList.remove('open');
      searchInput.classList.remove('has-results');
      activeIdx = -1;
      currentMatches = [];
      return;
    }
    const ql = q.toLowerCase();
    currentMatches = nodes.filter((n) => {
      const candidates = [
        n.label, n.label_en,
        ...(n.synonyms_pt || []),
        ...(n.synonyms_en || []),
      ];
      return candidates.some((c) => c && c.toLowerCase().includes(ql));
    }).slice(0, 12);

    if (currentMatches.length === 0) {
      searchResults.innerHTML = `<div class="sr-empty">Nenhum resultado para "${q}"</div>`;
    } else {
      searchResults.innerHTML = currentMatches.map((n, i) => `
        <div class="sr-item" data-idx="${i}">
          <span class="sr-dot" style="background:${n.color || TYPE_COLOR[n.type] || '#888'}"></span>
          <span>
            <span class="sr-label">${highlight(n.label, q)}</span>
            ${n.label_en ? `<span class="sr-en"> · ${n.label_en}</span>` : ''}
          </span>
        </div>`).join('');

      searchResults.querySelectorAll('.sr-item').forEach((el) => {
        el.addEventListener('mousedown', (ev) => {
          ev.preventDefault();
          selectNode(currentMatches[+el.dataset.idx]);
        });
      });
    }

    searchInput.classList.toggle('has-results', currentMatches.length > 0);
    searchResults.classList.add('open');
    activeIdx = -1;
  }

  function setActive(idx) {
    const items = searchResults.querySelectorAll('.sr-item');
    items.forEach((el) => el.classList.remove('active'));
    if (idx >= 0 && idx < items.length) {
      items[idx].classList.add('active');
      items[idx].scrollIntoView({ block: 'nearest' });
    }
    activeIdx = idx;
  }

  searchInput.addEventListener('input', (ev) => renderResults(ev.target.value));

  searchInput.addEventListener('keydown', (ev) => {
    const len = currentMatches.length;
    if (ev.key === 'ArrowDown')  { ev.preventDefault(); setActive((activeIdx + 1) % len); }
    if (ev.key === 'ArrowUp')    { ev.preventDefault(); setActive((activeIdx - 1 + len) % len); }
    if (ev.key === 'Enter' && len > 0) {
      selectNode(currentMatches[activeIdx >= 0 ? activeIdx : 0]);
    }
    if (ev.key === 'Escape')     { closeSearch(); clearFocus(); }
  });

  searchInput.addEventListener('blur', () => {
    setTimeout(() => searchResults.classList.remove('open'), 150);
  });
  searchInput.addEventListener('focus', () => {
    if (searchInput.value.trim()) renderResults(searchInput.value);
  });

  /* Global keyboard shortcuts */
  document.addEventListener('keydown', (ev) => {
    if ((ev.metaKey || ev.ctrlKey) && ev.key === 'k') {
      ev.preventDefault();
      searchInput.focus();
      searchInput.select();
      return;
    }
    /* Skip zoom shortcuts when typing in search */
    if (document.activeElement === searchInput) return;
    if ((ev.key === '+' || ev.key === '=') && !ev.metaKey && !ev.ctrlKey) { ev.preventDefault(); zoomIn(); }
    if ((ev.key === '-' || ev.key === '_') && !ev.metaKey && !ev.ctrlKey) { ev.preventDefault(); zoomOut(); }
    if (ev.key === '0' && !ev.metaKey && !ev.ctrlKey) { ev.preventDefault(); resetView(); }
    if ((ev.key === 'f' || ev.key === 'F') && !ev.metaKey && !ev.ctrlKey) { ev.preventDefault(); fitView(); }
  });
})();
</script>
</body>
</html>
