services:
  neo4j:
    image: neo4j:5-community
    container_name: geobrain-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/geobrain123
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
    volumes:
      - neo4j-data:/data
      - ./build/neo4j:/var/lib/neo4j/import
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  loader:
    image: neo4j:5-community
    container_name: geobrain-loader
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./build/neo4j:/import
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Loading nodes..."
        cypher-shell -a bolt://neo4j:7687 -u neo4j -p geobrain123 --file /import/nodes.cypher
        echo "Loading relationships..."
        cypher-shell -a bolt://neo4j:7687 -u neo4j -p geobrain123 --file /import/relationships.cypher
        echo "Done."
    restart: "no"

volumes:
  neo4j-data:
