    # os dados do sistema MPD. [PE-2EXP-00074 §3.1.2]

    internal_standards: ["PP-2POC-00341", "PE-2POC-01247"]
    # CONFIRMED FROM: PP-2POC-00341 §5 define AP.
    # RESOLVED FROM: PE-2POC-01247 (Perfuração com Contrapressão na
    # Superfície MPD/SBP) é o padrão operacional que rege o uso do AP.

    sources_append:
      - doc_id: PP-2POC-00341
        section: "§5 Definições"
        citation: >
          "AP - Anchor point: A profundidade na qual a pressão no anular
          do poço deve ser mantida constante com emprego do sistema de MPD,
          para todos os alinhamentos possíveis."


