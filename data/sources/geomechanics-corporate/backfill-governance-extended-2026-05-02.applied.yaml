- match_id: GEOMEC014
  # label_pt: Compressibilidade de Poros
  apply:
    owner_department: "RES"
    # CONFIRMED FROM: "produto primário para simulação de reservatórios"
    # + "Cp é insumo crítico na interpretação de TLDs" (definição do card)

    official_datastore: ["SIRR", "BDIEP"]
    # RESOLVED FROM: "Método 3b — Modelo Numérico Geomecânico ... fornece
    # como subproduto ... a compressibilidade de poros da formação em cada
    # elemento da malha geomecânica." [PP-2E&P-00322 §3.8] → resultados
    # do modelo ficam no SIRR. Ensaios laboratoriais ficam no BDIEP
    # (mesmo fluxo de GEOMEC022 — Scratch Test).
    # NEEDS REVIEW: confirmar se Cp de laboratório vai para PROLAB
    # separado de BDIEP (veja nota em GEOMEC022).

    internal_tools: ["GeomecBR", "SIGEO"]
    # CONFIRMED FROM: "modelagem geomecânica numérica 3D" + GEOMEC024
    # cita "GeomecBR acoplado ao simulador de fluxo"
    # RESOLVED FROM: "Uma metodologia sugerida se encontra no módulo
    # multipoços do SIGEO." [PP-2E&P-00322 §3.5.2.5] — SIGEO também
    # é usado na cadeia de cálculo de Cp via perfis de densidade.

    internal_standards: ["PP-2E&P-00322"]
    # CONFIRMED FROM: "Correlação Petrobras para turbiditos
    # (Figura 9 do PP-2E&P-00322)"

    sources_append:
      - doc_id: PP-2E&P-00322
        section: "§3.8 Análise de Compressibilidade da Rocha Reservatório"
        citation: >
          "A partir de uma coletânea de resultados de ensaios de laboratório
          realizados em turbiditos disponíveis na literatura e em relatórios
          técnicos da Petrobras, estabeleceu-se uma correlação Petrobras para
          estimar a partir da porosidade, em turbiditos."
      - doc_id: PP-2E&P-00322
        section: "§3.8 Método 2: Ensaios de Laboratório"
        citation: >
          "A compressibilidade de poros obtida em ensaios hidrostáticos em
          laboratório deve ser corrigida para que possa ser aplicada em
          estudos de reservatórios."
      - doc_id: PP-2E&P-00322
        section: "§3.8 Método 3b"
        citation: >
          "Na interpretação dos Testes de Longa Duração (TLD), a
          compressibilidade de poros da formação deve ser estimada
          criteriosamente, uma vez que esse parâmetro pode impactar
          significativamente as interpretações dos volumes in place."


