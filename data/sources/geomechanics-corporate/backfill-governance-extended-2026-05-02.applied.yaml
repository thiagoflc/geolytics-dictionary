- match_id: GEOMEC044
  # label_pt: Washout
  apply:
    owner_department: "POÇOS/SPO/PEP/PROJ-PERF"
    # RESOLVED FROM: Washout é evento operacional de poço detectado
    # durante a perfuração. POÇOS/SPO/PEP/PROJ-PERF é o dono da operação.
    # "O colapso do poço pode ocorrer devido aos esforços de cisalhamento
    # ou tração. Esses modos de falha levam a dois tipos de perfil de poço:
    # Poço com caliper arrombado (washout e breakouts)."
    # [PE-2RES-00009 §3.4.3]

    official_datastore: ["OpenWells", "BDIEP"]
    # RESOLVED FROM: Washout é identificado pelo perfil caliper (BDIEP)
    # e reportado nos BDPs (OpenWells).
    # "todos os eventos ocorridos durante a perfuração são relatados nos
    # boletins diários da perfuração (BDP) [...] disponibiliza a ferramenta
    # OpenWells para acesso ao banco de dados." [PE-2RES-00009 §3.2]

    internal_tools: ["WELLSOM", "SIGEO"]
    # RESOLVED FROM: WELLSOM acessa os BDPs para filtragem de eventos
    # geomecânicos incluindo washout. SIGEO armazena os perfis caliper
    # que evidenciam o washout.

    internal_standards: ["PE-2RES-00009"]
    # RESOLVED FROM: PE-2RES-00009 §3.4.3 cita washout como modo de falha
    # por colapso do poço — única citação literal encontrada nos padrões.

    sources_append:
      - doc_id: PE-2RES-00009
        section: "§3.4.3 Arraste, Estolamento, Prisão, Desvios e Fundo Falso"
        citation: >
          "Colapso do poço significa que a formação perfurada não resistiu
          aos esforços e falhou mecanicamente. O colapso do poço pode
          ocorrer devido aos esforços de cisalhamento ou tração. Esses
          modos de falha levam a dois tipos de perfil de poço: Poço com
          caliper arrombado (washout e breakouts); Poço com perda de
          calibre (fechamento / redução de diâmetro)."
    # NOTA: não há critério quantitativo corporativo para washout por
    # caliper nos padrões consultados. GAP RESIDUAL: solicitar ao time
    # RES/TR/GMR se existe CT interna ou threshold operacional definido
    # (ex.: caliper > X% do diâmetro nominal = washout).


- match_id: GEOMEC045
  # label_pt: Prisão de Coluna
  apply:
    owner_department: "POÇOS/SPO/PEP/PROJ-PERF"
    # CONFIRMED FROM: GEOMEC009 cita POÇOS/SPO/PEP/PROJ-PERF como dono
    # da janela operacional cujo descumprimento causa prisão de coluna.

    official_datastore: ["OpenWells", "BDIEP"]
    # CONFIRMED FROM: evidence_gaps "Requer ligação com BDIEP/OpenWells/
    # BDP para evidência operacional por evento" + GEOMEC025 cita BDP
    # gerenciado via OpenWells.

    internal_tools: ["WELLSOM", "OpenWells"]
    # CONFIRMED FROM: GEOMEC025 cita WELLSOM e OpenWells para gestão de
    # eventos de poço.

    internal_standards: ["PE-2RES-00009"]
    # CONFIRMED FROM: GEOMEC009 cita PE-2RES-00009 §3.4.3

    sources_append:
      - doc_id: PE-2RES-00009
        section: "§3.4.3 Arraste, Estolamento, Prisão, Desvios e Fundo Falso"
        citation: >
          "As principais causas dos eventos de arraste, topamento, prisão,
          estolamento e fundo falso são: Colapso do poço (estabilidade);
          Limpeza deficiente (hidráulica); Diferencial de pressão;
          Tortuosidade da trajetória."
      - doc_id: PE-2RES-00009
        section: "§3.4.3 Arraste, Estolamento, Prisão, Desvios e Fundo Falso"
        citation: >
          "As formações frágeis são potencialmente fontes de cascalhos que
          levam a prisão das colunas. Formações frágeis, por serem mais
          suscetíveis a arrombamento, intercaladas com formações mais
          competentes, levam a criação de batentes que são fontes de
          topamentos."

