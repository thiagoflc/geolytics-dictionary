# ───── Coef Poisson ─────
- match_id: GEOMEC012
  apply:
    label_pt: "Coeficiente de Poisson"
    label_en: "Poisson's Ratio"
    confidence: high
    priority_tier: core_15
    standard_unit: "adimensional"
    acronym_union: ["ν", "n"]
    definition_pt: "Razão entre a deformação lateral e a deformação axial de uma rocha sob carga uniaxial. O coeficiente dinâmico é calculado a partir das velocidades de ondas compressional (Vp) e cisalhante (Vs), usando as correlações de Castagna et al. (1993) quando não há perfil DTS disponível. Para o coeficiente de Poisson, não há correlação clara entre os valores dinâmico e estático, de modo que as estimativas dinâmicas são em geral empregadas nas simulações geomecânicas sem correções. É insumo fundamental para o cálculo da tensão mínima horizontal pelo método elástico."
    definition_en: "Ratio of lateral to axial strain under uniaxial load. The dynamic coefficient is calculated from Vp and Vs using Castagna et al. (1993) correlations when no DTS log is available. No reliable dynamic-to-static conversion exists; dynamic estimates are used in geomechanical simulations without correction. Fundamental input for minimum horizontal stress via the elastic method."
    sources_append:
      - doc_id: PE-2RES-00014
        section: "§3.4.2.5 Método elástico"
        citation: "O coeficiente de Poisson dinâmico é calculado através da seguinte equação: Para o valor de Poisson infelizmente não há clara correlação entre os coeficientes dinâmico de petrossísmica e o estático de ensaios de laboratório, motivo pelo qual as estimativas dinâmicas deste coeficiente são em geral empregadas em simulações geomecânicas sem correções."
      - doc_id: PP-2E&P-00322
        section: "§5.1 Siglas"
        citation: "n coeficiente de poisson."
      - doc_id: PP-2E&P-00322
        section: "§3.5.6 Dados Laboratoriais"
        citation: "Compressibilidade de Poros Uniaxial: O módulo de Young e coeficiente de Poisson também podem ser determinados."
