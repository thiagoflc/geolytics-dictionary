# ───── Coef Biot-Willis ─────
- match_id: GEOMEC013
  apply:
    label_pt: "Coeficiente de Biot-Willis"
    label_en: "Biot-Willis Coefficient"
    confidence: high
    priority_tier: core_15
    standard_unit: "adimensional"
    acronym_union: ["α", "Biot"]
    definition_pt: "Parâmetro poro-elástico que quantifica a fração da pressão de poros que contribui para a tensão efetiva. Calculado a partir da rigidez bulk da rocha (Kb) e da rigidez bulk dos grãos (Ks) — para Ks são utilizados valores tabelados da literatura (Tabela 5 do PE-2RES-00014). É elemento mandatório na modelagem do equilíbrio estrutural geomecânico, conforme PP-2E&P-00322. Em formações com coeficiente de Biot igual à unidade e Poisson de 0,25, a variação de uma tensão total horizontal é igual a 2/3 da depleção do reservatório."
    definition_en: "Poroelastic parameter quantifying the fraction of pore pressure contributing to effective stress. Calculated from rock bulk stiffness (Kb) and grain bulk stiffness (Ks) using tabulated literature values. Mandatory element in geomechanical structural equilibrium modeling per PP-2E&P-00322. With Biot = 1 and Poisson = 0.25, a change in total horizontal stress equals 2/3 of reservoir depletion."
    sources_append:
      - doc_id: PP-2E&P-00322
        section: "§3.9.2 Modelagem do equilíbrio estrutural"
        citation: "Princípio das tensões efetivas com adequada representação do coeficiente de Biot-Willis."
      - doc_id: PE-2RES-00014
        section: "§3.4.2.5 Método elástico"
        citation: "Para a rigidez dos grãos da rocha, Ks, são utilizados valores tabelados da literatura (Tabela 5). O coeficiente de Biot é então estimado através da equação."
      - doc_id: PE-2RES-00014
        section: "§3.4.2.6 Correção da depleção"
        citation: "supondo que o coeficiente de Biot seja igual à unidade e um coeficiente de Poisson de 0,25, a variação da magnitude de uma tensão total horizontal é igual a 2/3 da depleção do reservatório."
    relationships_replace:
      - { relation_type: INFLUENCES, target_id: GEOMEC005, target_label: "Tensão Efetiva" }
      - { relation_type: DERIVED_FROM, target_id: GEOMEC011, target_label: "Módulo de Young" }

# ───── Testes de Absorção e Fraturamento ─────
- match_id: GEOMEC006
  apply:
    label_pt: "Testes de Absorção e Fraturamento (LOT/xLOT/FIT)"
    label_en: "Leak-Off / Extended Leak-Off / Formation Integrity Tests"
    confidence: high
    priority_tier: core_15
    standard_unit: "ppg (lb/gal)"
    units_observed_union: ["ppg (lb/gal)", "psi", "kgf/cm²", "kgf/cm²/m"]
    acronym_union: ["LOT", "xLOT", "XLOT", "FIT", "DFIT", "DPPT", "Mini-frac", "MicroFrac", "SRT", "SDT", "Micro-TI", "MicroTI"]
    category: Measurement
    definition_pt: "Conjunto de operações de campo realizadas para medição e calibração das tensões in situ, especialmente da tensão mínima horizontal. Classificação Petrobras (PE-2E&P-00984): (1) Baixo custo — FIT, LOT e xLOT com coluna de perfuração; (2) Alto custo — MicroFrac/Micro-TI com ferramenta dedicada a cabo ou coluna. Hierarquia de qualidade: Mini-frac/MicroFrac/xLOT (fornece pressão de reabertura/fechamento = estimativa direta de Shmin) > SRT/SDT/TI/MicroTI > LOT (pressão de absorção = limite inferior de Shmin). O DFIT é a versão dinâmica do FIT para poços com MPD (verificação da resistência da formação). O DPPT é o teste dinâmico para verificação do limite inferior da janela operacional."
    definition_en: "Field operations to measure and calibrate in situ stresses, especially Shmin. Petrobras classification (PE-2E&P-00984): (1) low-cost — FIT, LOT, xLOT with drill string; (2) high-cost — MicroFrac/Micro-TI with dedicated tool. Quality hierarchy: Mini-frac/MicroFrac/xLOT (direct Shmin via reopening/closure pressure) > SRT/SDT/TI/MicroTI > LOT (absorption pressure = lower bound of Shmin). DFIT is the dynamic FIT for MPD wells; DPPT is the dynamic pore pressure test for lower-window verification."
    sources_append:
      - doc_id: PE-2RES-00014
        section: "§3.4.1 Testes de absorção e fraturamento"
        citation: "Na indústria do petróleo a estimativa da magnitude da tensão horizontal mínima é feita com base em uma operação que envolva a propagação de uma fratura na formação, como as operações de MiniFrac, MicroFrac, xLOT, SRT, SDT, TI, MicroTI e Pump-in/Flow-back."
      - doc_id: PP-2POC-00341
        section: "§5 Definições"
        citation: "DFIT - Dynamic Formation Integrity Test: Teste para verificação da resistência da formação às pressões esperadas nas operações subsequentes. DPPT - Dynamic Pore Pressure Test: Teste para verificação do limite inferior da janela operacional."
      - doc_id: PE-2RES-00009
        section: "§3.2 Atividade"
        citation: "os dados de absorção devem ser ajustados por meio de um multiplicador sobre a curva tensão mínima (S3) no poço, portanto, essa curva tem o formato da curva de tensão mínima, mas multiplicado por um fator."
    relationships_replace:
      - { relation_type: MEASURED_BY, target_id: GEOMEC002, target_label: "Tensão Mínima Horizontal (Gradiente de Fratura)" }
      - { relation_type: CONSTRAINS, target_id: GEOMEC003, target_label: "Janela Operacional de Lama" }
      - { relation_type: INFLUENCES, target_id: GEOMEC004, target_label: "Estado de Tensões In Situ (Geotensões)" }
