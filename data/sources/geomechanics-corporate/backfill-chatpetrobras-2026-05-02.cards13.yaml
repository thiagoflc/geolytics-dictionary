# ───── ECD ─────
- match_id: GEOMEC019
  apply:
    label_pt: "Densidade Equivalente de Circulação"
    label_en: "Equivalent Circulating Density"
    confidence: high
    priority_tier: core_15
    standard_unit: "lb/gal"
    units_observed_union: ["lb/gal", "ppg"]
    acronym_union: ["ECD", "Equivalent Circulation Density", "Equivalent Circulating Density"]
    category: Measurement
    definition_pt: "Pressão dinâmica exercida numa determinada profundidade vertical do poço (L), expressa como massa específica equivalente do fluido de perfuração. É a soma da pressão hidrostática (Ph) e da perda de carga (ΔPa) ao escoamento do fluido desde aquela profundidade até a superfície. Fórmula interna: ECD (lb/gal) = [Ph(psi) + ΔPa(psi)] / [0,1704 × L(m)]. Monitorada em tempo real pelo PWDa e pelo SIMCARR. ECD acima da tensão mínima S3 induz fratura e perda de circulação; ECD abaixo da Pp provoca influxo."
    definition_en: "Dynamic pressure at a given vertical wellbore depth (L) expressed as equivalent drilling fluid density. Sum of hydrostatic pressure (Ph) and annular friction losses (ΔPa). Internal formula: ECD (lb/gal) = [Ph(psi) + ΔPa(psi)] / [0.1704 × L(m)]. Monitored in real time via PWDa and SIMCARR. ECD above S3 induces fracture and lost circulation; ECD below Pp causes influx."
    sources_append:
      - doc_id: PE-2POC-00453
        section: "§3.2.1 Conceito de ECD"
        citation: "A Densidade Equivalente de Circulação (ECD) indica a pressão dinâmica exercida numa determinada profundidade vertical poço (L), expressa em massa específica equivalente de fluido de perfuração."
      - doc_id: PE-2POC-00453
        section: "§3.2.1 Conceito de ECD"
        citation: "ECD (lb/gal) = [Ph(psi) + Δ Pa(psi)] / [0,1704 x L(m)]"
      - doc_id: PP-2POC-00341
        section: "§5 Definições"
        citation: "ECD - Equivalent Circulation Density: Densidade de circulação equivalente é a densidade efetiva do fluido circulante no poço, resultante da soma da pressão imposta pela coluna hidrostática de fluido, pressão de fricção e contrapressão aplicada na superfície."
    relationships_replace:
      - { relation_type: IS_PART_OF, target_id: GEOMEC003, target_label: "Janela Operacional de Lama" }
      - { relation_type: CONSTRAINS, target_id: GEOMEC001, target_label: "Pressão de Poros" }
      - { relation_type: CONSTRAINS, target_id: GEOMEC002, target_label: "Tensão Mínima Horizontal" }
      - { relation_type: DERIVED_FROM, target_id: GEOMEC020, target_label: "Perfuração com Controle de Pressão (MPD)" }

# ───── Sv ─────
- match_id: GEOMEC007
  apply:
    label_pt: "Tensão Vertical / Sobrecarga (Sv)"
    label_en: "Vertical Stress / Overburden"
    confidence: high
    priority_tier: core_15
    standard_unit: "ppg (lb/gal)"
    units_observed_union: ["ppg (lb/gal)", "kgf/cm²/m", "psi"]
    acronym_union: ["Sv", "GS"]
    definition_pt: "Componente vertical do estado de tensões gerada pelo peso das formações rochosas sobrejacentes. Calculada pela integração do perfil de densidade ao longo da coluna de rocha. Em formações salinas, as tensões horizontais tendem a se igualar a Sv (regime hidrostático), de modo que o peso do fluido de perfuração deve se aproximar do gradiente de sobrecarga para reduzir a fluência do sal. É o dado mais fundamental para a definição do estado de tensões em subsuperfície."
    definition_en: "Vertical stress component generated by the weight of overlying rock formations. Calculated by integrating the density log along the wellbore. In evaporitic sequences, horizontal stresses converge toward Sv; drilling fluid weight must approach the overburden gradient to reduce salt creep."
    sources_append:
      - doc_id: PP-2E&P-00322
        section: "§3.5.2.5 Cálculo do Volume de Densidade"
        citation: "A densidade é um importante parâmetro para a diferenciação de litologias, fluidos, porosidade e para o cálculo da tensão vertical."
      - doc_id: PP-2E&P-00322
        section: "§3.5.2.5 Cálculo do Volume de Densidade"
        citation: "Obtenção da tensão vertical a partir da integração do perfil de densidade."
      - doc_id: PE-2RES-00009
        section: "§3.10.2 Riscos para estabilidade do poço"
        citation: "Em formações salinas é desejável, para evitar problemas na perfuração, que o peso do fluido seja próximo ao gradiente de sobrecarga, reduzindo a taxa de fluência do sal."
    relationships_replace:
      - { relation_type: IS_PART_OF, target_id: GEOMEC004, target_label: "Estado de Tensões In Situ (Geotensões)" }
      - { relation_type: INFLUENCES, target_id: GEOMEC005, target_label: "Tensão Efetiva" }
      - { relation_type: INFLUENCES, target_id: GEOMEC021, target_label: "Pressão de Crescimento Anular (APB)" }

# ───── UCS ─────
- match_id: GEOMEC010
  apply:
    label_pt: "Resistência à Compressão Uniaxial (UCS)"
    label_en: "Unconfined Compressive Strength"
    confidence: high
    priority_tier: core_15
    standard_unit: "MPa"
    units_observed_union: ["MPa", "psi", "kgf/cm²"]
    acronym_union: ["UCS"]
    definition_pt: "Tensão máxima suportada por uma amostra de rocha durante a aplicação de um carregamento uniaxial sem confinamento lateral. Obtida principalmente pelo Scratch Test (arranhamento contínuo do testemunho ao longo do eixo axial) ou por correlações com perfis de poços (DTC, DTS, densidade). É insumo fundamental para o cálculo do gradiente de colapso e para a retroanálise da magnitude de SHmax a partir de breakouts."
    definition_en: "Maximum axial stress a rock sample sustains under unconfined uniaxial loading. Primarily obtained from the Scratch Test on core samples or via well log correlations. Key input for collapse gradient calculation and SHmax back-analysis from breakouts."
    sources_append:
      - doc_id: PP-2E&P-00322
        section: "§3.5.1.3 Cálculo de Perfis de Resistência"
        citation: "A resistência não confinada (UCS - Unconfined Compressive Strength), que é a tensão máxima suportada pelo material durante a aplicação de um carregamento uniaxial sem confinamento lateral."
      - doc_id: PP-2E&P-00322
        section: "§3.5.6 Dados Laboratoriais"
        citation: "Scratch Test: ensaio de arranhamento de testemunho de rocha ao longo do seu eixo axial. A resistência ao arranhamento é correlacionável com propriedades mecânicas das rochas. O principal dado obtido a partir deste ensaio é o UCS."
      - doc_id: PE-2RES-00014
        section: "§3.3.3 Tensões horizontais máximas"
        citation: "UCS é a resistência não confinada da rocha, que pode ser estimada por alguma das diversas equações disponíveis na literatura ou por medidas diretas em testemunho."
    relationships_replace:
      - { relation_type: INFLUENCES, target_id: GEOMEC009, target_label: "Gradiente de Colapso" }
      - { relation_type: INFLUENCES, target_id: GEOMEC008, target_label: "Tensão Horizontal Máxima (SHmax)" }
      - { relation_type: IS_PART_OF, target_id: GEOMEC011, target_label: "Módulo de Young" }

# ───── MPD ─────
- match_id: GEOMEC020
  apply:
    label_pt: "Perfuração com Controle de Pressão (MPD)"
    label_en: "Managed Pressure Drilling"
    confidence: high
    priority_tier: core_15
    standard_unit: "psi"
    units_observed_union: ["psi"]
    acronym_union: ["MPD", "SBP", "AP"]
    definition_pt: "Conjunto de técnicas de perfuração (ou completação) adaptáveis utilizadas para controlar com precisão o perfil de pressão no anular do poço. A técnica principal é o SBP (Surface Back Pressure), que aplica contrapressão na superfície no Anchor Point (AP) — a profundidade na qual a pressão no anular deve ser mantida constante para todos os alinhamentos possíveis. Amplamente utilizada nos campos do Pré-Sal e em zonas com elevado potencial de perda de circulação."
    definition_en: "Adaptable drilling and completion techniques that precisely control the annular pressure profile. The primary technique is SBP (Surface Back Pressure), which applies back-pressure at the surface Anchor Point. Widely used in Pre-Salt fields and in formations with high lost-circulation risk."
    sources_append:
      - doc_id: PP-2POC-00341
        section: "§5 Definições"
        citation: "MPD - Managed Pressure Drilling: Conjunto de técnicas de perfuração (ou completação) adaptáveis, utilizados para controlar o perfil de pressão no anular do poço."
      - doc_id: PP-2POC-00341
        section: "§5 Definições"
        citation: "AP - Anchor point: A profundidade na qual a pressão no anular do poço deve ser mantida constante com emprego do sistema de MPD, para todos os alinhamentos possíveis."
      - doc_id: PE-2RES-00009
        section: "§3.4.2.2 Potencial Geológico de Perda"
        citation: "As sondas equipadas com MPD gerenciam a pressão do anular do poço, viabilizando a perfuração de intervalos com elevado risco de perda, diminuindo os atrasos e custos operacionais."
    relationships_replace:
      - { relation_type: CONSTRAINS, target_id: GEOMEC019, target_label: "Densidade Equivalente de Circulação (ECD)" }
      - { relation_type: IS_PART_OF, target_id: GEOMEC003, target_label: "Janela Operacional de Lama" }
      - { relation_type: CONSTRAINS, target_id: GEOMEC001, target_label: "Pressão de Poros" }
      - { relation_type: CONSTRAINS, target_id: GEOMEC002, target_label: "Tensão Mínima Horizontal (Gradiente de Fratura)" }

# ───── APB ─────
- match_id: GEOMEC021
  apply:
    label_pt: "Pressão de Crescimento Anular (APB)"
    label_en: "Annular Pressure Buildup"
    confidence: high
    priority_tier: core_15
    standard_unit: "psi"
    units_observed_union: ["psi", "kgf/cm²"]
    acronym_union: ["APB", "AFE"]
    definition_pt: "Variação de pressão no anular confinado de um poço oriunda do efeito de expansão/contração térmica do fluido (AFE — Annulus Fluid Expansion) gerada durante operações de produção ou injeção de fluidos quentes. Em poços submarinos HP/HT, os valores de APB podem ser elevados e levar à falha mecânica dos revestimentos e/ou da coluna. O APB reverso (negativo) resulta da contração térmica durante injeção de fluidos frios. Em zonas salinas, o sal ao fluir pressuriza adicionalmente o fluido anular."
    definition_en: "Pressure variation in a confined wellbore annulus caused by thermal expansion/contraction of trapped fluid (Annulus Fluid Expansion, AFE). In HP/HT subsea wells, APB values can be high enough to cause casing or tubing mechanical failure. Negative APB (reverse) results from cold-fluid injection. In salt sections, creep further pressurizes the annular fluid."
    sources_append:
      - doc_id: PP-2POC-00341
        section: "§5 Definições"
        citation: "APB - Annular Pressure Buildup: Variação de pressão no anular confinado de um poço oriunda do efeito de expansão/contração térmica do fluido."
      - doc_id: PE-2POC-01472
        section: "§3.7 APB"
        citation: "Como resultado das operações de produção/injeção de fluidos quentes, há o aquecimento dos fluidos confinados nos anulares do poço, gerando uma expansão térmica conhecida como AFE (Annulus Fluid Expansion). Nesse cenário, os elementos estruturais do poço são submetidos a um acréscimo de pressão denominado APB (Annular Pressure Build-up)."
      - doc_id: PE-2RES-00009
        section: "§3.10.3 Dimensionamento dos Revestimentos"
        citation: "As tensões in situ no sal irão ser utilizadas para o cálculo do APB. O sal ao fluir pressuriza todo o fluido que preenche o anular entre o revestimento e a rocha perfurada."
    relationships_replace:
      - { relation_type: IS_CALCULATED_FROM, target_id: GEOMEC007, target_label: "Tensão Vertical / Sobrecarga (Sv)" }
      - { relation_type: CONSTRAINS, target_id: GEOMEC003, target_label: "Janela Operacional de Lama" }

# ───── Gradiente de Colapso ─────
- match_id: GEOMEC009
  apply:
    label_pt: "Gradiente de Colapso"
    label_en: "Collapse Gradient / Wellbore Collapse Pressure"
    confidence: high
    priority_tier: core_15
    standard_unit: "ppg (lb/gal)"
    units_observed_union: ["ppg (lb/gal)", "g/cm³"]
    acronym_union: ["GC"]
    owner_department: "POÇOS/SPO/PEP/PROJ-PERF"
    definition_pt: "Limite inferior da Janela Operacional de Lama, abaixo do qual a formação perfurada não resiste aos esforços e falha mecanicamente (colapso). Em rochas frágeis (arenitos, folhelhos), o colapso resulta em alargamento (washout, breakouts); em rochas dúcteis (sal, folhelhos argilosos), resulta em fechamento do diâmetro. É calculado pela gerência POÇOS/SPO/PEP/PROJ-PERF e é a principal causa de eventos de arraste, estolamento, topamento, prisão de coluna e fundo falso."
    definition_en: "Lower bound of the Mud Weight Window below which the drilled formation fails mechanically (collapse). Brittle formations (sandstones, shales) yield borehole enlargement; ductile formations (salt, plastic shales) yield closure. Calculated by POÇOS/SPO/PEP/PROJ-PERF. Primary cause of drag, stalling, toppling, stuck pipe, and false bottom events."
    sources_append:
      - doc_id: PE-2RES-00009
        section: "§3.10.3 Dimensionamento dos Revestimentos"
        citation: "Os limites inferior (gradiente de colapso) e superior (gradiente de fratura) da janela operacional são estimados com base nas curvas de tensão in-situ (tensão mínima) e gradiente de poropressão extraídos dos modelos geomecânicos."
      - doc_id: PE-2RES-00009
        section: "§3.10.2 Riscos para estabilidade"
        citation: "Para maior eficiência da perfuração e entendimento dos eventos reportados, recomenda-se considerar as curvas de pressão de colapso inferior e superior no dimensionamento do peso do fluido."
      - doc_id: PE-2RES-00009
        section: "§3.4.3 Arraste, Estolamento, Prisão"
        citation: "Colapso do poço significa que a formação perfurada não resistiu aos esforços e falhou mecanicamente."
    relationships_replace:
      - { relation_type: IS_PART_OF, target_id: GEOMEC003, target_label: "Janela Operacional de Lama" }
      - { relation_type: IS_CALCULATED_FROM, target_id: GEOMEC010, target_label: "Resistência à Compressão Uniaxial (UCS)" }
      - { relation_type: IS_CALCULATED_FROM, target_id: GEOMEC001, target_label: "Pressão de Poros" }
      - { relation_type: IS_CALCULATED_FROM, target_id: GEOMEC004, target_label: "Estado de Tensões In Situ (Geotensões)" }

# ───── SHmax ─────
- match_id: GEOMEC008
  apply:
    label_pt: "Tensão Horizontal Máxima (SHmax)"
    label_en: "Maximum Horizontal Stress"
    confidence: high
    priority_tier: core_15
    standard_unit: "psi"
    units_observed_union: ["psi", "MPa", "kgf/cm²"]
    acronym_union: ["SHmax", "SHmáx", "S1"]
    definition_pt: "Componente de maior magnitude entre as tensões horizontais in situ. Não pode ser medida diretamente — é estimada por retroanálise de breakouts e fraturas induzidas identificadas em perfis de imagem, ou por mecanismos focais de terremotos. A direção de SHmax é fornecida pelas fraturas induzidas (paralelas a SHmax) e a direção de Shmin pelos breakouts. A magnitude é calculada pelo modelo de integridade de poço proposto por Santos et al. (CT CMR 010/2015), usando UCS, Pp, peso do fluido (Mw) e Shmin."
    definition_en: "Largest-magnitude horizontal in situ stress component. Cannot be measured directly — estimated by back-analysis of breakouts and drilling-induced fractures from image logs. SHmax direction is given by induced fractures (parallel to SHmax); Shmin by breakouts. Magnitude calculated via the wellbore integrity model (Santos et al., CT CMR 010/2015) using UCS, Pp, Mw, and Shmin."
    sources_append:
      - doc_id: PE-2RES-00014
        section: "§3.3.3 Tensões horizontais máximas"
        citation: "Esta componente das tensões in situ não pode ser medida diretamente, mas apenas modelada a partir da retroanálise de breakouts e fraturas induzidas, ou ainda por mecanismos focais de terremotos."
      - doc_id: PE-2RES-00014
        section: "§3.3.3 Tensões horizontais máximas"
        citation: "os trechos em que são encontradas feições nos fornecem a direção da tensão horizontal mínima (breakouts) e a direção da tensão horizontal máxima (fraturas induzidas)."
      - doc_id: PP-2E&P-00322
        section: "§3.5.1.4 Análise de Perfil de Imagem"
        citation: "Através de perfis de imagem pode-se determinar tanto a orientação quanto o ângulo de abertura dos breakout, e consequentemente, a direção das tensões horizontais mínima (Shmín) e máxima (Shmáx), que são ortogonais entre si."
    relationships_replace:
      - { relation_type: IS_PART_OF, target_id: GEOMEC004, target_label: "Estado de Tensões In Situ (Geotensões)" }
      - { relation_type: IS_CALCULATED_FROM, target_id: GEOMEC010, target_label: "Resistência à Compressão Uniaxial (UCS)" }
      - { relation_type: IS_CALCULATED_FROM, target_id: GEOMEC001, target_label: "Pressão de Poros" }
      - { relation_type: IS_CALCULATED_FROM, target_id: GEOMEC002, target_label: "Tensão Mínima Horizontal (Gradiente de Fratura)" }

# ───── Tensão Efetiva ─────
- match_id: GEOMEC005
  apply:
    label_pt: "Tensão Efetiva"
    label_en: "Effective Stress"
    confidence: high
    priority_tier: core_15
    standard_unit: "psi"
    units_observed_union: ["psi", "MPa", "kgf/cm²"]
    definition_pt: "Tensão resultante após descontar a contribuição da pressão de poros, conforme o Princípio das Tensões Efetivas com representação adequada do coeficiente de Biot-Willis. É o parâmetro governante da deformação e da resistência das rochas em subsuperfície. A variação da pressão de poros por depleção ou injeção afeta diretamente a magnitude das tensões horizontais totais, na proporção definida pelo coeficiente de Biot e pelo coeficiente de Poisson."
    definition_en: "Net stress after subtracting pore pressure contribution per the effective stress principle, with appropriate representation of the Biot-Willis coefficient. Governs rock deformation and strength at depth. Changes in pore pressure from depletion or injection directly alter total horizontal stress magnitudes, scaled by the Biot and Poisson coefficients."
    sources_append:
      - doc_id: PP-2E&P-00322
        section: "§3.9.2 Modelagem do equilíbrio estrutural"
        citation: "Princípio das tensões efetivas com adequada representação do coeficiente de Biot-Willis."
      - doc_id: PE-2RES-00009
        section: "§3.9.2 Aquisição de Dados Geomecânicos"
        citation: "a poropressão de folhelhos e formações pouco permeáveis são de difícil obtenção, por isso, o cálculo das tensões efetivas nesses materiais deve ser empregado com cautela."
      - doc_id: PE-2RES-00014
        section: "§3.4.2.6 Correção da depleção"
        citation: "a alteração da pressão de poros do reservatório afeta a magnitude das tensões horizontais totais. Na condição de compactação unidirecional ou oedométrica, a variação da magnitude das tensões horizontais totais pode ser estimada com a seguinte expressão."
    relationships_replace:
      - { relation_type: IS_CALCULATED_FROM, target_id: GEOMEC001, target_label: "Pressão de Poros" }
      - { relation_type: IS_CALCULATED_FROM, target_id: GEOMEC004, target_label: "Estado de Tensões In Situ (Geotensões)" }
      - { relation_type: DERIVED_FROM, target_id: GEOMEC013, target_label: "Coeficiente de Biot-Willis" }

# ───── Estado de Tensões In Situ ─────
- match_id: GEOMEC004
  apply:
    label_pt: "Estado de Tensões In Situ (Geotensões)"
    label_en: "In Situ Stress State (Geotensions)"
    confidence: high
    priority_tier: core_15
    standard_unit: "ppg (lb/gal)"
    units_observed_union: ["ppg (lb/gal)", "psi", "kgf/cm²/m"]
    acronym_union: ["S1", "S2", "S3"]
    definition_pt: "Conjunto das três tensões principais que atuam nas formações rochosas em subsuperfície antes de qualquer perturbação: tensão maior (S1), tensão intermediária (S2) e tensão menor (S3). No contexto de perfuração, nos Laudos Geomecânicos da Petrobras são fornecidas as curvas de S1, S2 e S3 (Magnitude e Azimute) ao longo da trajetória do poço, calibradas aos testes de pressão disponíveis (LOT, XLOT, FIT) e ajustadas às profundidades previstas no QPG, em versão original e suavizada (média móvel), em psi e em lb/gal."
    definition_en: "Set of three principal stresses acting on subsurface rock formations prior to any disturbance: major (S1), intermediate (S2), and minor (S3). In Petrobras Geomechanical Reports, S1, S2, and S3 curves (magnitude and azimuth) along the well trajectory are provided calibrated to available pressure tests, in both original and smoothed (moving average) versions, in psi and lb/gal."
    sources_append:
      - doc_id: PE-2RES-00009
        section: "§3.2 Atividade"
        citation: "o RES fornecerá para a área de poços o gradiente de poro-pressão e as curvas de tensão principal S1, S2, S3 (Magnitude e Azimute) calibradas aos testes de pressão disponíveis (LOT, XLOT, FIT…)."
      - doc_id: PE-2RES-00009
        section: "§3.2 Atividade"
        citation: "também será fornecida uma versão dos gradientes com suavização (aplicação de média móvel), uma planilha com os dados em psi e uma figura contendo as curvas em lb/gal que constará no Laudo Geomecânico."
      - doc_id: PP-2E&P-00322
        section: "§3.9.2 Modelagem"
        citation: "O estado de tensões estimado deve obedecer a princípios de equilíbrio, ou seja, devem resultar em um sistema em equilíbrio estrutural quase-estático."
    relationships_replace:
      - { relation_type: IS_CALCULATED_FROM, target_id: GEOMEC001, target_label: "Pressão de Poros" }
      - { relation_type: IS_PART_OF, target_id: GEOMEC007, target_label: "Tensão Vertical / Sobrecarga (Sv)" }
      - { relation_type: IS_PART_OF, target_id: GEOMEC002, target_label: "Tensão Mínima Horizontal (Gradiente de Fratura)" }
      - { relation_type: IS_PART_OF, target_id: GEOMEC008, target_label: "Tensão Horizontal Máxima (SHmax)" }
      - { relation_type: INFLUENCES, target_id: GEOMEC005, target_label: "Tensão Efetiva" }

# ───── Módulo de Young ─────
- match_id: GEOMEC011
  apply:
    label_pt: "Módulo de Young"
    label_en: "Young's Modulus"
    confidence: high
    priority_tier: core_15
    standard_unit: "GPa"
    units_observed_union: ["GPa", "MPa", "psi"]
    acronym_union: ["E", "Edyn", "Est"]
    definition_pt: "Propriedade elástica que mede a rigidez da rocha, definida como a razão entre tensão e deformação axial em ensaio uniaxial. Na Petrobras, distinguem-se: módulo dinâmico (Edyn — obtido de perfis sônicos DTC e DTS) e módulo estático (Est — obtido em ensaios de laboratório). A conversão Edyn→Est referenciada internamente utiliza a correlação de Lacy (1996). Para zonas salinas sem DTS, aplica-se o fluxo Teixeira et al. (2019): Vp → Vs → E → densidade. Insumo obrigatório para análises de UV2/UV3 e para o cálculo de Biot-Willis."
    definition_en: "Elastic property measuring rock stiffness as the ratio of axial stress to axial strain. Petrobras distinguishes: dynamic modulus (Edyn, from DTC/DTS sonic logs) and static modulus (Est, from laboratory tests). Internal Edyn→Est conversion via Lacy (1996). Mandatory input for UV2/UV3 analyses and Biot-Willis calculation."
    sources_append:
      - doc_id: PE-2RES-00014
        section: "§3.4.2.5 Método elástico"
        citation: "Os módulos de Young dinâmico, Edyn, e estático, Est, (Lacy, 1996), são calculados segundo as equações abaixo."
      - doc_id: PP-2E&P-00322
        section: "§5.1 Siglas"
        citation: "E Módulo de Elasticidade ou Young."
      - doc_id: PP-2E&P-00322
        section: "§3.5.6 Dados Laboratoriais"
        citation: "Compressibilidade de Poros Uniaxial: O módulo de Young e coeficiente de Poisson também podem ser determinados."
    relationships_replace:
