# Backfill Governance Extended — template para 29 entidades não-core_15
# Versão template | gerado 2026-05-02
# Dono do preenchimento: Gestão e Governança de Dados (GGD) + RES/TR/GMR + POÇOS
#
# ──────────────────────────────────────────────────────────────────────
# WORKFLOW DE USO
# ──────────────────────────────────────────────────────────────────────
# 1. O time GGD/RES/POÇOS abre este YAML e, para cada entrada:
#       - confirma ou corrige os valores marcados com `# CONFIRMED FROM: ...`
#         (foram extraídos de texto JÁ existente em data/geomechanics-corporate.json
#          — confiança alta, mas devem ser ratificados pelo dono do campo);
#       - preenche cada campo marcado `# TODO: ...` ou remove a entrada do
#         campo se realmente não se aplica;
#       - adiciona itens em `sources_append` (estruturados: doc_id/section/citation)
#         sempre que houver citação documental disponível.
#
# 2. Validação (dry-run, NÃO modifica o master JSON):
#       python3 scripts/backfill-geomec-corporate.py \
#           data/sources/geomechanics-corporate/backfill-governance-extended-31-template.yaml \
#           --dry-run
#
# 3. Aplicação definitiva (modifica data/geomechanics-corporate.json,
#    arquivando valores antigos sob entity._legacy.<field>):
#       python3 scripts/backfill-geomec-corporate.py \
#           data/sources/geomechanics-corporate/backfill-governance-extended-31-template.yaml
#
# ──────────────────────────────────────────────────────────────────────
# ESCOPO
# ──────────────────────────────────────────────────────────────────────
# Cobre as 29 entidades NÃO marcadas com priority_tier=core_15.
# (Spec original previa 31, mas o master JSON tem 47 = 16 core_15
#  + 2 deprecated/out-of-scope (GEOMEC026, GEOMEC026A) + 29 alvos.)
# Entidades fora deste template:
#   - 16 core_15 (GEOMEC001..013, 019, 020, 021): backfill já feito,
#     governança será revisada em frente separada;
#   - GEOMEC026 (deprecated) e GEOMEC026A (out_of_scope): não receberão
#     governança neste ciclo.
#
# ──────────────────────────────────────────────────────────────────────
# CONVENÇÃO DE DOMÍNIOS / DATASTORES MENCIONADOS NO ARQUIVO BASE
# ──────────────────────────────────────────────────────────────────────
# owner_department candidatos observados:
#   "RES" (Reservatórios) | "RES/TR/GMR" | "POÇOS/SPO/PEP/PROJ-PERF"
