name: Eval harness

on:
  push:
    branches: [main]
    paths:
      - "eval/**"
      - "data/**"
      - ".github/workflows/eval.yml"
  pull_request:
    paths:
      - "eval/**"
      - "data/**"
      - ".github/workflows/eval.yml"

concurrency:
  group: eval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eval:
    name: Run eval + regression check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: eval/requirements.txt

      - name: Install eval deps
        run: |
          python -m pip install --upgrade pip
          if [ -f eval/requirements.txt ]; then
            pip install -r eval/requirements.txt
          fi

      - name: Run eval — vector_only
        run: python eval/run.py --runner vector_only --offline --limit 30
        env:
          ANTHROPIC_API_KEY: "ci-offline-placeholder"

      - name: Run eval — graphrag_validator
        run: python eval/run.py --runner graphrag_validator --offline --limit 30
        env:
          ANTHROPIC_API_KEY: "ci-offline-placeholder"

      - name: Generate eval report
        run: python eval/report.py

      - name: Check regression against baseline
        run: |
          python - <<'EOF'
          import json, sys, os, glob

          baseline_path = "eval/baseline.json"
          candidates = sorted(glob.glob("eval/results/graphrag_validator-*.json"))
          results_path = candidates[-1] if candidates else ""

          if not os.path.exists(baseline_path):
              print("No baseline.json found — skipping regression check.")
              sys.exit(0)
          if not os.path.exists(results_path):
              print("No results.json found — cannot compare. Skipping.")
              sys.exit(0)

          with open(baseline_path) as f:
              baseline = json.load(f)
          with open(results_path) as f:
              results = json.load(f)

          baseline_score = baseline.get("scores", {}).get("composite_score", 0.0)
          current_score = results.get("scores", {}).get("composite_score", 0.0)
          threshold = 0.05  # 5% regression threshold

          drop = baseline_score - current_score
          print(f"Baseline composite: {baseline_score:.4f}")
          print(f"Current composite:  {current_score:.4f}")
          print(f"Drop: {drop:.4f} (threshold: {threshold:.4f})")

          if drop > threshold:
              print(f"FAIL: composite score dropped by {drop:.4f}, exceeds threshold {threshold:.4f}")
              sys.exit(1)
          print("PASS: composite score within acceptable range.")
          EOF

      - name: Detect baseline drift on main (manual update required)
        # Branch protection on main blocks github-actions[bot] from pushing
        # directly. Instead of trying to commit the baseline (which fails with
        # 403), this step DETECTS drift and surfaces it as a workflow notice.
        # When drift is detected, run locally:
        #   cp eval/results/graphrag_validator-*.json eval/baseline.json
        #   git add eval/baseline.json && git commit -m "chore: update eval baseline"
        # and push via PR.
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        continue-on-error: true
        run: |
          LATEST=$(ls -1t eval/results/graphrag_validator-*.json 2>/dev/null | head -1)
          if [ -z "$LATEST" ]; then
            echo "No graphrag_validator result found — nothing to compare."
            exit 0
          fi
          if diff -q "$LATEST" eval/baseline.json > /dev/null 2>&1; then
            echo "✓ Baseline matches latest eval result — no drift."
          else
            echo "::notice title=Eval baseline drift detected::eval/baseline.json differs from $LATEST. Update manually via PR (see step comment)."
            echo ""
            echo "=== Diff (first 50 lines) ==="
            diff "$LATEST" eval/baseline.json | head -50 || true
          fi
