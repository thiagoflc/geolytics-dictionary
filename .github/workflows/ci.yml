name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Node syntax check
        run: |
          for f in scripts/*.js; do
            node --check "$f"
          done

      - name: Python syntax check
        run: |
          find . -name "*.py" \
            -not -path "./.git/*" \
            -not -path "./node_modules/*" \
            -not -path "./mcp/geolytics-mcp/node_modules/*" \
            | xargs python -m py_compile

  node-tests:
    name: Node tests + regen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm (root)
        if: hashFiles('package.json') != ''
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-root-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-root-

      - name: Install root npm deps (if any)
        if: hashFiles('package.json') != ''
        run: npm ci --ignore-scripts

      - name: Run Node tests
        run: node --test tests/validator.test.js

      - name: Verify regen is reproducible
        run: |
          node scripts/generate.js
          # Ignore timestamp-only diffs in the "generated" field.
          # Any structural change (added/removed keys, changed values) still fails.
          if git diff data/full.json api/v1/ \
              | grep '^[+-]' \
              | grep -v '^---' \
              | grep -v '^+++' \
              | grep -v '"generated":' \
              | grep -q .; then
            echo "FAIL: regen produced structural changes beyond timestamps."
            git diff data/full.json api/v1/
            exit 1
          else
            echo "OK: only timestamp changes detected (expected)."
          fi

  shacl:
    name: SHACL validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create venv and install deps
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install pyshacl rdflib

      - name: Run SHACL validation
        run: .venv/bin/python scripts/validate-shacl.py

  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-python-tests-${{ hashFiles('python/**') }}
          restore-keys: pip-python-tests-

      - name: Install python package
        run: |
          python -m pip install --upgrade pip
          pip install -e "python/[graph,rag]"
          pip install pytest

      - name: Run pytest
        run: pytest python/tests/ -q

  langgraph-tests:
    name: LangGraph agent tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-langgraph-${{ hashFiles('examples/langgraph-agent/requirements.txt') }}
          restore-keys: pip-langgraph-

      - name: Install LangGraph agent deps (CPU-only, no embeddings)
        run: |
          python -m pip install --upgrade pip
          # Install without optional heavy sentence-transformers / chromadb
          grep -v "sentence-transformers" examples/langgraph-agent/requirements.txt \
            | grep -v "chromadb" \
            > /tmp/langgraph-requirements-ci.txt
          pip install -r /tmp/langgraph-requirements-ci.txt
          pip install pytest

      - name: Run pytest
        run: pytest examples/langgraph-agent/tests/ -q
        env:
          ANTHROPIC_API_KEY: "ci-offline-placeholder"
          OPENAI_API_KEY: "ci-offline-placeholder"

  eval:
    name: Eval harness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-eval-${{ hashFiles('eval/**') }}
          restore-keys: pip-eval-

      - name: Install eval deps
        run: |
          python -m pip install --upgrade pip
          if [ -f eval/requirements.txt ]; then
            pip install -r eval/requirements.txt
          fi

      - name: Run eval — vector_only
        run: |
          python eval/run.py --runner vector_only --offline --limit 30
        env:
          ANTHROPIC_API_KEY: "ci-offline-placeholder"

      - name: Run eval — graphrag_validator
        run: |
          python eval/run.py --runner graphrag_validator --offline --limit 30
        env:
          ANTHROPIC_API_KEY: "ci-offline-placeholder"

      - name: Generate eval report
        run: python eval/report.py

      - name: Check regression against baseline
        run: |
          python - <<'EOF'
          import json, sys, os

          import glob
          baseline_path = "eval/baseline.json"
          candidates = sorted(glob.glob("eval/results/graphrag_validator-*.json"))
          results_path = candidates[-1] if candidates else ""

          if not os.path.exists(baseline_path):
              print("No baseline.json found — skipping regression check.")
              sys.exit(0)

          if not os.path.exists(results_path):
              print("No results.json found — cannot compare. Skipping.")
              sys.exit(0)

          with open(baseline_path) as f:
              baseline = json.load(f)
          with open(results_path) as f:
              results = json.load(f)

          baseline_score = baseline.get("scores", {}).get("composite_score", 0.0)
          current_score = results.get("scores", {}).get("composite_score", 0.0)
          threshold = 0.05  # 5% regression threshold

          drop = baseline_score - current_score
          print(f"Baseline composite: {baseline_score:.4f}")
          print(f"Current composite:  {current_score:.4f}")
          print(f"Drop: {drop:.4f} (threshold: {threshold:.4f})")

          if drop > threshold:
              print(f"FAIL: composite score dropped by {drop:.4f}, exceeds threshold {threshold:.4f}")
              sys.exit(1)
          else:
              print("PASS: composite score within acceptable range.")
          EOF

      - name: Update baseline on main
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          LATEST=$(ls -1t eval/results/graphrag_validator-*.json 2>/dev/null | head -1)
          if [ -n "$LATEST" ]; then
            cp "$LATEST" eval/baseline.json
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add eval/baseline.json
            git diff --staged --quiet || git commit -m "chore: update eval baseline [skip ci]"
            git push
          fi

  mcp-build:
    name: MCP TypeScript build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm (mcp)
        uses: actions/cache@v4
        with:
          path: mcp/geolytics-mcp/node_modules
          key: npm-mcp-${{ hashFiles('mcp/geolytics-mcp/package-lock.json') }}
          restore-keys: npm-mcp-

      - name: Install MCP deps
        working-directory: mcp/geolytics-mcp
        run: npm ci

      - name: TypeScript type check
        working-directory: mcp/geolytics-mcp
        run: npx tsc --noEmit

  graph-diff:
    name: Entity graph diff
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Compute graph diff
        id: diff
        run: |
          BASE_SHA=${{ github.event.pull_request.base.sha }}

          git show "${BASE_SHA}:data/entity-graph.json" > /tmp/base-graph.json 2>/dev/null || echo '{"nodes":[],"edges":[]}' > /tmp/base-graph.json
          cp data/entity-graph.json /tmp/head-graph.json 2>/dev/null || echo '{"nodes":[],"edges":[]}' > /tmp/head-graph.json

          python3 - <<'EOF'
          import json, os

          with open("/tmp/base-graph.json") as f:
              base = json.load(f)
          with open("/tmp/head-graph.json") as f:
              head = json.load(f)

          base_nodes = {n.get("id") for n in base.get("nodes", [])}
          head_nodes = {n.get("id") for n in head.get("nodes", [])}
          base_edges = {(e.get("from"), e.get("rel"), e.get("to")) for e in base.get("edges", [])}
          head_edges = {(e.get("from"), e.get("rel"), e.get("to")) for e in head.get("edges", [])}

          added_nodes = sorted(head_nodes - base_nodes)
          removed_nodes = sorted(base_nodes - head_nodes)
          added_edges = sorted(head_edges - base_edges)
          removed_edges = sorted(base_edges - head_edges)

          lines = ["## Entity graph diff", ""]
          lines.append(f"**Nodes:** {len(base_nodes)} -> {len(head_nodes)} ({len(added_nodes):+d} added, {len(removed_nodes):+d} removed)")
          lines.append(f"**Edges:** {len(base_edges)} -> {len(head_edges)} ({len(added_edges):+d} added, {len(removed_edges):+d} removed)")

          if added_nodes:
              lines.append("")
              lines.append("### Added nodes")
              for n in added_nodes[:20]:
                  lines.append(f"- `{n}`")
              if len(added_nodes) > 20:
                  lines.append(f"- ... and {len(added_nodes)-20} more")

          if removed_nodes:
              lines.append("")
              lines.append("### Removed nodes")
              for n in removed_nodes[:20]:
                  lines.append(f"- `{n}`")
              if len(removed_nodes) > 20:
                  lines.append(f"- ... and {len(removed_nodes)-20} more")

          if added_edges:
              lines.append("")
              lines.append("### Added edges")
              for e in added_edges[:20]:
                  lines.append(f"- `{e[0]}` --{e[1]}--> `{e[2]}`")
              if len(added_edges) > 20:
                  lines.append(f"- ... and {len(added_edges)-20} more")

          if removed_edges:
              lines.append("")
              lines.append("### Removed edges")
              for e in removed_edges[:20]:
                  lines.append(f"- `{e[0]}` --{e[1]}--> `{e[2]}`")
              if len(removed_edges) > 20:
                  lines.append(f"- ... and {len(removed_edges)-20} more")

          if not added_nodes and not removed_nodes and not added_edges and not removed_edges:
              lines.append("")
              lines.append("No changes to entity graph.")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              body = "\n".join(lines)
              # Escape for multiline output
              body_escaped = body.replace("%", "%25").replace("\n", "%0A").replace("\r", "%0D")
              f.write(f"body={body_escaped}\n")
          EOF

      - name: Post graph diff comment
        uses: actions/github-script@v7
        env:
          DIFF_BODY: ${{ steps.diff.outputs.body }}
        with:
          script: |
            // Body already computed by the previous Python step.
            // Passing the full graph JSON via env hits "Argument list too long"
            // once the graph grows past a few thousand entries.
            const rawBody = (process.env.DIFF_BODY || '')
              .replace(/%0A/g, '\n').replace(/%0D/g, '\r').replace(/%25/g, '%');
            const marker = '<!-- entity-graph-diff -->';
            const fullBody = `${marker}\n${rawBody || '## Entity graph diff\n\nNo changes detected.'}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }
