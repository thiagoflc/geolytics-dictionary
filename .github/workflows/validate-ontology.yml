name: Validate ontology

on:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "scripts/validate-shacl*"
      - "scripts/semantic-validator*"
      - ".github/workflows/validate-ontology.yml"
  pull_request:
    paths:
      - "data/**"
      - "scripts/validate-shacl*"
      - "scripts/semantic-validator*"
      - ".github/workflows/validate-ontology.yml"

concurrency:
  group: validate-ontology-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shacl:
    name: SHACL validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install validator extras
        run: |
          python -m pip install --upgrade pip
          pip install -e "python/[validator]"

      - name: Run SHACL validation (default — geolytics shapes)
        run: python scripts/validate-shacl.py

      - name: Run SHACL validation (F6 — 6-layer ontology invariants)
        # Validates the live entity-graph (data/geobrain.ttl) against the
        # F6 regra-de-ouro shapes. Hard rules must pass; warnings are
        # tracked separately for curator review (F4/F7).
        run: |
          python scripts/validate-shacl.py \
            --data data/geobrain.ttl \
            --shapes data/ontology-layers-shapes.ttl \
            --no-ontology

      - name: Run F6 SHACL pytest regression suite
        run: |
          pip install pytest
          python -m pytest tests/test_ontology_layers_shacl.py -v

  graph-diff:
    name: Entity graph diff
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Compute graph diff
        id: diff
        run: |
          BASE_SHA=${{ github.event.pull_request.base.sha }}

          git show "${BASE_SHA}:data/entity-graph.json" > /tmp/base-graph.json 2>/dev/null \
            || echo '{"nodes":[],"edges":[]}' > /tmp/base-graph.json
          cp data/entity-graph.json /tmp/head-graph.json 2>/dev/null \
            || echo '{"nodes":[],"edges":[]}' > /tmp/head-graph.json

          python3 - <<'EOF'
          import json, os

          with open("/tmp/base-graph.json") as f:
              base = json.load(f)
          with open("/tmp/head-graph.json") as f:
              head = json.load(f)

          base_nodes = {n.get("id") for n in base.get("nodes", [])}
          head_nodes = {n.get("id") for n in head.get("nodes", [])}
          base_edges = {(e.get("from"), e.get("rel"), e.get("to")) for e in base.get("edges", [])}
          head_edges = {(e.get("from"), e.get("rel"), e.get("to")) for e in head.get("edges", [])}

          added_nodes = sorted(head_nodes - base_nodes)
          removed_nodes = sorted(base_nodes - head_nodes)
          added_edges = sorted(head_edges - base_edges)
          removed_edges = sorted(base_edges - head_edges)

          lines = ["## Entity graph diff", ""]
          lines.append(f"**Nodes:** {len(base_nodes)} -> {len(head_nodes)} ({len(added_nodes):+d} added, {len(removed_nodes):+d} removed)")
          lines.append(f"**Edges:** {len(base_edges)} -> {len(head_edges)} ({len(added_edges):+d} added, {len(removed_edges):+d} removed)")

          for label, items, fmt in [
              ("Added nodes", added_nodes, lambda x: f"- `{x}`"),
              ("Removed nodes", removed_nodes, lambda x: f"- `{x}`"),
              ("Added edges", added_edges, lambda x: f"- `{x[0]}` --{x[1]}--> `{x[2]}`"),
              ("Removed edges", removed_edges, lambda x: f"- `{x[0]}` --{x[1]}--> `{x[2]}`"),
          ]:
              if items:
                  lines.append("")
                  lines.append(f"### {label}")
                  for item in items[:20]:
                      lines.append(fmt(item))
                  if len(items) > 20:
                      lines.append(f"- ... and {len(items)-20} more")

          if not (added_nodes or removed_nodes or added_edges or removed_edges):
              lines.append("")
              lines.append("No changes to entity graph.")

          body = "\n".join(lines)
          body_escaped = body.replace("%", "%25").replace("\n", "%0A").replace("\r", "%0D")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"body={body_escaped}\n")
          EOF

      - name: Post graph diff comment
        uses: actions/github-script@v7
        env:
          DIFF_BODY: ${{ steps.diff.outputs.body }}
        with:
          script: |
            const rawBody = (process.env.DIFF_BODY || '')
              .replace(/%0A/g, '\n').replace(/%0D/g, '\r').replace(/%25/g, '%');
            const marker = '<!-- entity-graph-diff -->';
            const fullBody = `${marker}\n${rawBody || '## Entity graph diff\n\nNo changes detected.'}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }
