name: Lint

on:
  push:
    branches: [main]
    paths:
      - "**/*.py"
      - "**/*.js"
      - "**/*.ts"
      - ".github/workflows/lint.yml"
  pull_request:
    paths:
      - "**/*.py"
      - "**/*.js"
      - "**/*.ts"
      - ".github/workflows/lint.yml"

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  syntax:
    name: Syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Node syntax check
        run: |
          for f in scripts/*.js; do
            node --check "$f"
          done

      - name: Python syntax check
        run: |
          find . -name "*.py" \
            -not -path "./.git/*" \
            -not -path "./node_modules/*" \
            -not -path "./mcp/geobrain-mcp/node_modules/*" \
            | xargs python -m py_compile

  ruff:
    name: Ruff (Python lint + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          src: "python"
          version: "0.7.4" # keep in sync with .pre-commit-config.yaml
          args: "check --config python/pyproject.toml"
      - uses: astral-sh/ruff-action@v3
        with:
          src: "python"
          version: "0.7.4"
          args: "format --check --config python/pyproject.toml"
