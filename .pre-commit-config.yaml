# Pre-commit hooks — https://pre-commit.com
# Install: pip install pre-commit && pre-commit install
# Run on demand: pre-commit run --all-files

minimum_pre_commit_version: "3.5.0"
default_language_version:
  python: python3.11

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(data/|api/v1/|build/|.*\.md$)
      - id: end-of-file-fixer
        exclude: ^(data/|api/v1/|build/)
      - id: check-yaml
        args: ["--unsafe"] # allow custom GH Actions tags
      - id: check-json
        exclude: ^(data/|api/v1/|ai/)
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: ["--fix", "--config=python/pyproject.toml"]
        files: ^python/
      - id: ruff-format
        args: ["--config=python/pyproject.toml"]
        files: ^python/

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [javascript, ts, json, yaml, markdown]
        exclude: ^(data/|api/v1/|ai/.*\.jsonl|build/|.*-cards\.html)

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.42.0
    hooks:
      - id: markdownlint
        args: ["--config", ".markdownlint.json"]
        exclude: ^(CHANGELOG\.md|docs/glosis/)
